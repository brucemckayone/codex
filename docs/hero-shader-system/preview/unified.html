<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Shader Hero — Unified Preview (Fluid + Presets)</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e5e5e5;font-family:system-ui,-apple-system,sans-serif}
.app{display:flex;height:100vh}
.preview{flex:1;position:relative;overflow:hidden;cursor:crosshair}
canvas{width:100%;height:100%;display:block}
.controls{width:300px;flex-shrink:0;padding:16px;background:#111;border-left:1px solid #2a2a2a;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
h1{font-size:14px;font-weight:600;color:#fff}
h2{font-size:10px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.08em}
.preset-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.preset-btn{padding:7px 4px;border:1px solid #2a2a2a;border-radius:6px;background:#1a1a1a;color:#aaa;font-size:10px;cursor:pointer;text-align:center;transition:all .15s}
.preset-btn:hover{border-color:#555;background:#222}
.preset-btn.active{border-color:#7c3aed;background:#1e1b4b;color:#fff}
.slider-row{display:grid;grid-template-columns:65px 1fr 34px;align-items:center;gap:6px}
.slider-row label{font-size:12px;color:#888}
.slider-row input[type=range]{width:100%;accent-color:#7c3aed}
.slider-row .val{font-size:10px;color:#555;font-family:monospace;text-align:right}
.color-row{display:flex;align-items:center;gap:8px}
.color-row label{font-size:12px;color:#888;width:70px}
.color-row input[type=color]{width:32px;height:24px;border:1px solid #333;border-radius:3px;cursor:pointer;background:none}
.color-row input[type=text]{width:72px;padding:3px 5px;background:#1a1a1a;border:1px solid #333;border-radius:3px;color:#ccc;font-family:monospace;font-size:11px}
.brand-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
.brand-btn{display:flex;align-items:center;gap:5px;padding:5px 7px;border:1px solid #2a2a2a;border-radius:5px;background:#1a1a1a;cursor:pointer;font-size:10px;color:#999;transition:all .15s}
.brand-btn:hover{border-color:#555}
.brand-swatch{width:12px;height:12px;border-radius:50%;border:1px solid #444;flex-shrink:0}
.hud{position:absolute;top:8px;left:8px;font:11px/1.3 monospace;color:#0f0;background:rgba(0,0,0,.7);padding:3px 8px;border-radius:3px;pointer-events:none}
.info{position:absolute;bottom:8px;left:8px;font:12px/1.5 system-ui;color:#777;background:rgba(0,0,0,.7);padding:6px 10px;border-radius:5px;pointer-events:none;max-width:380px}
section{display:flex;flex-direction:column;gap:6px}
</style>
</head>
<body>
<div class="app">
<div class="preview">
  <canvas id="c"></canvas>
  <div class="hud" id="hud">-- fps</div>
  <div class="info">Move mouse to interact with the fluid. Click for dye bursts.<br>Each preset is distorted by the fluid simulation.</div>
</div>
<div class="controls">
  <h1>Shader Hero — Fluid Presets</h1>
  <section>
    <h2>Preset</h2>
    <div class="preset-grid" id="presetGrid"></div>
  </section>
  <section>
    <h2>Animation</h2>
    <div class="slider-row"><label>Speed</label><input type="range" id="speed" min="0.1" max="2" step="0.1" value="0.5"><span class="val" id="speedVal">0.5</span></div>
    <div class="slider-row"><label>Intensity</label><input type="range" id="intensity" min="0" max="1" step="0.05" value="0.8"><span class="val" id="intensityVal">0.8</span></div>
    <div class="slider-row"><label>Detail</label><input type="range" id="complexity" min="0.1" max="1" step="0.1" value="0.5"><span class="val" id="complexityVal">0.5</span></div>
  </section>
  <section>
    <h2>Brand Colors</h2>
    <div class="color-row"><label>Primary</label><input type="color" id="c1" value="#7C3AED"><input type="text" id="c1t" value="#7C3AED"></div>
    <div class="color-row"><label>Secondary</label><input type="color" id="c2" value="#EC4899"><input type="text" id="c2t" value="#EC4899"></div>
    <div class="color-row"><label>Accent</label><input type="color" id="c3" value="#F59E0B"><input type="text" id="c3t" value="#F59E0B"></div>
    <div class="color-row"><label>Background</label><input type="color" id="cbg" value="#0F172A"><input type="text" id="cbgt" value="#0F172A"></div>
  </section>
  <section>
    <h2>Brand Presets</h2>
    <div class="brand-grid" id="brandGrid"></div>
  </section>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════
// UNIFIED FLUID + PRESET PREVIEW
// Architecture: Navier-Stokes sim (velocity field) +
// preset shaders that sample the velocity as distortion
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2',{alpha:false,antialias:false,depth:false,stencil:false});
if(!gl){document.body.innerHTML='<h1 style="padding:40px;color:red">WebGL2 required</h1>';throw 0;}
const extCBF=gl.getExtension('EXT_color_buffer_float');
if(!extCBF){document.body.innerHTML='<h1 style="padding:40px;color:red">EXT_color_buffer_float required</h1>';throw 0;}
gl.getExtension('OES_texture_float_linear');

// Config
const SIM=256,PITER=20,CURL=30,VDIS=0.98,DDIS=0.97,SRAD=0.004,SFORCE=6000;

// Palettes
const PALETTES={
  Vibrant:{colors:[[.486,.227,.929],[.925,.282,.6],[.961,.620,.043]],bg:[.059,.090,.165]},
  Neon:{colors:[[.133,.827,.933],[.639,.894,.212],[.957,.447,.714]],bg:[.035,.035,.043]},
  Ocean:{colors:[[.008,.522,.780],[.035,.569,.698],[.204,.827,.600]],bg:[.047,.290,.431]},
  Sunset:{colors:[[.882,.114,.282],[.976,.451,.086],[.984,.749,.141]],bg:[.110,.098,.090]},
  Ember:{colors:[[.863,.149,.149],[.918,.345,.047],[.988,.827,.302]],bg:[.110,.098,.090]},
  Mono:{colors:[[.898,.898,.898],[.639,.639,.639],[.322,.322,.322]],bg:[.039,.039,.039]},
};
let palette=PALETTES.Vibrant;
let speed=0.5,intensity=0.8,complexity=0.5;

// Helpers
function cs(t,s){const sh=gl.createShader(t);gl.shaderSource(sh,s);gl.compileShader(sh);if(!gl.getShaderParameter(sh,gl.COMPILE_STATUS)){console.error(gl.getShaderInfoLog(sh));return null;}return sh;}
function cp(v,f){const p=gl.createProgram();const vs=cs(gl.VERTEX_SHADER,v),fs=cs(gl.FRAGMENT_SHADER,f);if(!vs||!fs)return null;gl.attachShader(p,vs);gl.attachShader(p,fs);gl.linkProgram(p);if(!gl.getProgramParameter(p,gl.LINK_STATUS)){console.error(gl.getProgramInfoLog(p));return null;}return p;}
function gu(p,n){const u={};n.forEach(k=>u[k]=gl.getUniformLocation(p,k));return u;}
function hex2rgb(h){return[parseInt(h.slice(1,3),16)/255,parseInt(h.slice(3,5),16)/255,parseInt(h.slice(5,7),16)/255];}

// Quad
const qb=gl.createBuffer();gl.bindBuffer(gl.ARRAY_BUFFER,qb);
gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
gl.enable(gl.BLEND);gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA);
function bq(p){const a=gl.getAttribLocation(p,'a_position');gl.enableVertexAttribArray(a);gl.vertexAttribPointer(a,2,gl.FLOAT,false,0,0);}

// Shaders
const VS=`#version 300 es\nin vec2 a_position;out vec2 v_uv;void main(){v_uv=a_position*.5+.5;gl_Position=vec4(a_position,0,1);}`;
const H=`#version 300 es\nprecision highp float;precision highp sampler2D;in vec2 v_uv;out vec4 fragColor;uniform vec2 texelSize;\n`;

// Fluid sim shaders (same as fluid.html)
const splatP=cp(VS,H+`uniform sampler2D uTarget;uniform vec2 point;uniform vec3 color;uniform float radius;void main(){vec2 p=v_uv-point;p.x*=texelSize.y/texelSize.x;float s=exp(-dot(p,p)/radius);vec3 base=texture(uTarget,v_uv).rgb;fragColor=vec4(base+color*s,1.);}`);
const splatU=gu(splatP,['uTarget','point','color','radius','texelSize']);
const advP=cp(VS,H+`uniform sampler2D uVelocity;uniform sampler2D uSource;uniform float dt;uniform float dissipation;void main(){vec2 vel=texture(uVelocity,v_uv).xy;vec2 coord=v_uv-dt*vel*texelSize;fragColor=dissipation*texture(uSource,coord);}`);
const advU=gu(advP,['uVelocity','uSource','dt','dissipation','texelSize']);
const curlP=cp(VS,H+`uniform sampler2D uVelocity;void main(){float L=texture(uVelocity,v_uv-vec2(texelSize.x,0)).y;float R=texture(uVelocity,v_uv+vec2(texelSize.x,0)).y;float T=texture(uVelocity,v_uv+vec2(0,texelSize.y)).x;float B=texture(uVelocity,v_uv-vec2(0,texelSize.y)).x;fragColor=vec4(.5*(R-L-T+B),0,0,1);}`);
const curlU=gu(curlP,['uVelocity','texelSize']);
const vorP=cp(VS,H+`uniform sampler2D uVelocity;uniform sampler2D uCurl;uniform float curl;uniform float dt;void main(){float L=texture(uCurl,v_uv-vec2(texelSize.x,0)).x;float R=texture(uCurl,v_uv+vec2(texelSize.x,0)).x;float T=texture(uCurl,v_uv+vec2(0,texelSize.y)).x;float B=texture(uCurl,v_uv-vec2(0,texelSize.y)).x;float C=texture(uCurl,v_uv).x;vec2 f=.5*vec2(abs(T)-abs(B),abs(R)-abs(L));f/=length(f)+.0001;f*=curl*C;f.y*=-1.;vec2 vel=texture(uVelocity,v_uv).xy;fragColor=vec4(vel+f*dt,0,1);}`);
const vorU=gu(vorP,['uVelocity','uCurl','curl','dt','texelSize']);
const divP=cp(VS,H+`uniform sampler2D uVelocity;void main(){float L=texture(uVelocity,v_uv-vec2(texelSize.x,0)).x;float R=texture(uVelocity,v_uv+vec2(texelSize.x,0)).x;float T=texture(uVelocity,v_uv+vec2(0,texelSize.y)).y;float B=texture(uVelocity,v_uv-vec2(0,texelSize.y)).y;fragColor=vec4(.5*(R-L+T-B),0,0,1);}`);
const divU=gu(divP,['uVelocity','texelSize']);
const prsP=cp(VS,H+`uniform sampler2D uPressure;uniform sampler2D uDivergence;void main(){float L=texture(uPressure,v_uv-vec2(texelSize.x,0)).x;float R=texture(uPressure,v_uv+vec2(texelSize.x,0)).x;float T=texture(uPressure,v_uv+vec2(0,texelSize.y)).x;float B=texture(uPressure,v_uv-vec2(0,texelSize.y)).x;float d=texture(uDivergence,v_uv).x;fragColor=vec4((L+R+T+B-d)*.25,0,0,1);}`);
const prsU=gu(prsP,['uPressure','uDivergence','texelSize']);
const gsP=cp(VS,H+`uniform sampler2D uPressure;uniform sampler2D uVelocity;void main(){float L=texture(uPressure,v_uv-vec2(texelSize.x,0)).x;float R=texture(uPressure,v_uv+vec2(texelSize.x,0)).x;float T=texture(uPressure,v_uv+vec2(0,texelSize.y)).x;float B=texture(uPressure,v_uv-vec2(0,texelSize.y)).x;vec2 vel=texture(uVelocity,v_uv).xy;vel-=vec2(R-L,T-B)*.5;fragColor=vec4(vel,0,1);}`);
const gsU=gu(gsP,['uPressure','uVelocity','texelSize']);

// FBO
function mkFBO(w,h,int,fmt,typ,fil){const t=gl.createTexture();gl.bindTexture(gl.TEXTURE_2D,t);gl.texImage2D(gl.TEXTURE_2D,0,int,w,h,0,fmt,typ,null);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,fil);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,fil);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);const f=gl.createFramebuffer();gl.bindFramebuffer(gl.FRAMEBUFFER,f);gl.framebufferTexture2D(gl.FRAMEBUFFER,gl.COLOR_ATTACHMENT0,gl.TEXTURE_2D,t,0);gl.bindFramebuffer(gl.FRAMEBUFFER,null);return{fbo:f,tex:t,w,h};}
function mkDFBO(w,h){let a=mkFBO(w,h,gl.RGBA16F,gl.RGBA,gl.HALF_FLOAT,gl.LINEAR),b=mkFBO(w,h,gl.RGBA16F,gl.RGBA,gl.HALF_FLOAT,gl.LINEAR);return{get read(){return a},get write(){return b},swap(){[a,b]=[b,a]},get w(){return w},get h(){return h}};}

const vel=mkDFBO(SIM,SIM),dye=mkDFBO(1024,1024),pres=mkDFBO(SIM,SIM);
const curlFBO=mkFBO(SIM,SIM,gl.R16F,gl.RED,gl.HALF_FLOAT,gl.NEAREST);
const divFBO=mkFBO(SIM,SIM,gl.R16F,gl.RED,gl.HALF_FLOAT,gl.NEAREST);

function blit(t){if(t){gl.bindFramebuffer(gl.FRAMEBUFFER,t.fbo);gl.viewport(0,0,t.w,t.h);}else{gl.bindFramebuffer(gl.FRAMEBUFFER,null);gl.viewport(0,0,canvas.width,canvas.height);}gl.drawArrays(gl.TRIANGLE_STRIP,0,4);}
function ts(u,w,h){gl.uniform2f(u.texelSize,1/w,1/h);}

// ═══════════════════════════════════════════════════
// PRESET DISPLAY SHADERS (with fluid integration)
// ═══════════════════════════════════════════════════
// Each preset reads velocity field via u_fluidVel texture

const PRESET_COMMON = `#version 300 es
precision highp float;
precision highp sampler2D;
in vec2 v_uv;
out vec4 fragColor;
uniform vec2 u_resolution;
uniform float u_time;
uniform float u_speed;
uniform float u_intensity;
uniform float u_complexity;
uniform vec2 u_mouse;
uniform float u_mouse_influence;
uniform float u_scroll;
uniform vec3 u_color_primary;
uniform vec3 u_color_secondary;
uniform vec3 u_color_accent;
uniform vec3 u_color_bg;
uniform sampler2D u_fluidVel;
uniform sampler2D u_fluidDye;

// Noise
vec3 mod289(vec3 x){return x-floor(x*(1./289.))*289.;}
vec2 mod289v2(vec2 x){return x-floor(x*(1./289.))*289.;}
vec3 permute(vec3 x){return mod289(((x*34.)+1.)*x);}
float snoise2(vec2 v){const vec4 C=vec4(.211324865405187,.366025403784439,-.577350269189626,.024390243902439);vec2 i=floor(v+dot(v,C.yy));vec2 x0=v-i+dot(i,C.xx);vec2 i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);vec4 x12=x0.xyxy+C.xxzz;x12.xy-=i1;i=mod289v2(i);vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);m=m*m;m=m*m;vec3 x2=2.*fract(p*C.www)-1.;vec3 h=abs(x2)-.5;vec3 ox=floor(x2+.5);vec3 a0=x2-ox;m*=1.79284291400159-.85373472095314*(a0*a0+h*h);vec3 g;g.x=a0.x*x0.x+h.x*x0.y;g.yz=a0.yz*x12.xz+h.yz*x12.yw;return 130.*dot(m,g);}

vec4 mod289v4(vec4 x){return x-floor(x*(1./289.))*289.;}
vec4 permute4(vec4 x){return mod289v4(((x*34.)+1.)*x);}
vec4 taylorInvSqrt(vec4 r){return 1.79284291400159-.85373472095314*r;}
float snoise3(vec3 v){const vec2 C=vec2(1./6.,1./3.);const vec4 D=vec4(0.,.5,1.,2.);vec3 i=floor(v+dot(v,C.yyy));vec3 x0=v-i+dot(i,C.xxx);vec3 g2=step(x0.yzx,x0.xyz);vec3 l=1.-g2;vec3 i1=min(g2.xyz,l.zxy);vec3 i2=max(g2.xyz,l.zxy);vec3 x1=x0-i1+C.xxx;vec3 x2=x0-i2+C.yyy;vec3 x3=x0-D.yyy;i=mod289(i);vec4 p=permute4(permute4(permute4(i.z+vec4(0.,i1.z,i2.z,1.))+i.y+vec4(0.,i1.y,i2.y,1.))+i.x+vec4(0.,i1.x,i2.x,1.));float n_=.142857142857;vec3 ns=n_*D.wyz-D.xzx;vec4 j=p-49.*floor(p*ns.z*ns.z);vec4 x_=floor(j*ns.z);vec4 y_=floor(j-7.*x_);vec4 xx=x_*ns.x+ns.yyyy;vec4 yy=y_*ns.x+ns.yyyy;vec4 hh=1.-abs(xx)-abs(yy);vec4 b0=vec4(xx.xy,yy.xy);vec4 b1=vec4(xx.zw,yy.zw);vec4 s0=floor(b0)*2.+1.;vec4 s1=floor(b1)*2.+1.;vec4 sh=-step(hh,vec4(0.));vec4 a02=b0.xzyw+s0.xzyw*sh.xxyy;vec4 a1=b1.xzyw+s1.xzyw*sh.zzww;vec3 p0=vec3(a02.xy,hh.x);vec3 p1=vec3(a02.zw,hh.y);vec3 p2=vec3(a1.xy,hh.z);vec3 p3=vec3(a1.zw,hh.w);vec4 norm=taylorInvSqrt(vec4(dot(p0,p0),dot(p1,p1),dot(p2,p2),dot(p3,p3)));p0*=norm.x;p1*=norm.y;p2*=norm.z;p3*=norm.w;vec4 m=max(.6-vec4(dot(x0,x0),dot(x1,x1),dot(x2,x2),dot(x3,x3)),0.);m=m*m;return 42.*dot(m*m,vec4(dot(p0,x0),dot(p1,x1),dot(p2,x2),dot(p3,x3)));}
float fbm2(vec2 p,int oct){float v=0.,a=.5,f=1.;for(int i=0;i<8;i++){if(i>=oct)break;v+=a*snoise2(p*f);a*=.5;f*=2.;}return v;}

// Utils
vec2 hash2(vec2 p){p=vec2(dot(p,vec2(127.1,311.7)),dot(p,vec2(269.5,183.3)));return -1.+2.*fract(sin(p)*43758.5453123);}
vec3 brandPalette(float t,vec3 c1,vec3 c2,vec3 c3){t=clamp(t,0.,1.);return t<.5?mix(c1,c2,t*2.):mix(c2,c3,(t-.5)*2.);}
float scrollFade(){return 1.;}

// OKLAB
vec3 srgbToLinear(vec3 c){return pow(max(c,0.),vec3(2.2));}
vec3 linearToSrgb(vec3 c){return pow(max(c,0.),vec3(1./2.2));}
vec3 linearToOklab(vec3 c){float l=.4122214708*c.r+.5363325363*c.g+.0514459929*c.b;float m=.2119034982*c.r+.6806995451*c.g+.1073969566*c.b;float s=.0883024619*c.r+.2220049171*c.g+.6896926210*c.b;float l_=pow(l,1./3.);float m_=pow(m,1./3.);float s_=pow(s,1./3.);return vec3(.2104542553*l_+.7936177850*m_-.0040720468*s_,1.9779984951*l_-2.4285922050*m_+.4505937099*s_,.0259040371*l_+.7827717662*m_-.8086757660*s_);}
vec3 oklabToLinear(vec3 lab){float l_=lab.x+.3963377774*lab.y+.2158037573*lab.z;float m_=lab.x-.1055613458*lab.y-.0638541728*lab.z;float s_=lab.x-.0894841775*lab.y-1.2914855480*lab.z;return vec3(4.0767416621*l_*l_*l_-3.3077115913*m_*m_*m_+.2309699292*s_*s_*s_,-1.2684380046*l_*l_*l_+2.6097574011*m_*m_*m_-.3413193965*s_*s_*s_,-.0041960863*l_*l_*l_-.7034186147*m_*m_*m_+1.7076147010*s_*s_*s_);}
vec3 oklabMix(vec3 c1,vec3 c2,float t){return linearToSrgb(oklabToLinear(mix(linearToOklab(srgbToLinear(c1)),linearToOklab(srgbToLinear(c2)),t)));}
vec3 oklabPalette(float t,vec3 c1,vec3 c2,vec3 c3){t=clamp(t,0.,1.);return t<.5?oklabMix(c1,c2,t*2.):oklabMix(c2,c3,(t-.5)*2.);}
vec3 blendScreen(vec3 a,vec3 b){return 1.-(1.-a)*(1.-b);}

// Post-process
vec3 postProcess(vec3 c,vec2 uv,float time){
  c=c/(1.+c)*.9+c*.1;
  c=smoothstep(vec3(0.),vec3(1.),c);
  float luma=dot(c,vec3(.299,.587,.114));c=mix(vec3(luma),c,1.15);
  vec2 v2=uv*2.-1.;c*=max(1.-dot(v2,v2)*.3,0.);
  float g=fract(sin(dot(uv*time*.5+vec2(12.9898,78.233),vec2(12.9898,78.233)))*43758.5453);
  float ga=mix(.04,.015,luma);c+=(g-.5)*ga;
  return clamp(c,0.,1.);
}
`;

const PRESETS = {
'fluid-only':{name:'Fluid Only',frag:`
void main(){
  vec3 d=texture(u_fluidDye,v_uv).rgb;
  vec3 color=u_color_bg+d;
  color=postProcess(color,v_uv,u_time);
  fragColor=vec4(color,1.);
}`},

'gradient-mesh':{name:'Gradient Mesh',frag:`
void main(){
  vec2 uv=v_uv;
  vec2 fv=texture(u_fluidVel,v_uv).xy;
  float fs=u_mouse_influence*0.0003;
  vec2 duv=uv+fv*fs;
  vec2 p=duv*2.-1.;p.x*=u_resolution.x/u_resolution.y;
  float t=u_time*.1;
  float n1=snoise3(vec3(p*.4,t*.15))*.5+.5;
  float n2=snoise3(vec3(p*.8+3.7,t*.35))*.5+.5;
  float n3=snoise3(vec3(p*1.4+7.3,t*.65))*.5+.5;
  float soft=.25+(1.-u_intensity)*.2;
  n1=smoothstep(soft,1.-soft,n1);n2=smoothstep(soft,1.-soft,n2);n3=smoothstep(soft,1.-soft,n3);
  float comp=n1*.5+n2*.3+n3*.2+(duv.x*.15+duv.y*.1-.125);
  comp=clamp(comp,0.,1.);
  vec3 color=oklabPalette(comp,u_color_primary,u_color_secondary,u_color_accent);
  color+=smoothstep(.7,1.,n1)*u_intensity*.12;
  float vm=length(fv)*500.;
  color+=oklabMix(u_color_accent,u_color_primary,.5)*vm*.06*u_mouse_influence;
  vec3 flat2=oklabMix(u_color_primary,u_color_secondary,uv.x*.7+uv.y*.3);
  color=mix(flat2,color,u_intensity);
  color=postProcess(color,v_uv,u_time);
  fragColor=vec4(color,1.);
}`},

// Compile preset display programs

function buildPreset(id) {
  const src = PRESET_COMMON + '\n' + PRESETS[id].frag;
  const prog = cp(VS, src);

}

Object.keys(PRESETS).forEach(id => buildPreset(id));

// ═══════════════════════════════════════════════════
// MOUSE & SPLATS

const prev=document.querySelector('.preview');

  gl.uniform1f(u.u_time,(now-startTime)/1000*speed);
  gl.uniform1f(u.u_speed,speed);
  gl.uniform1f(u.u_intensity,intensity);
  gl.uniform1f(u.u_complexity,complexity);
  gl.uniform2f(u.u_mouse,mx,my);
  gl.uniform1f(u.u_mouse_influence,1.0);
  gl.uniform1f(u.u_scroll,0.);
  gl.uniform3fv(u.u_color_primary,c1);
  gl.uniform3fv(u.u_color_secondary,c2);
  gl.uniform3fv(u.u_color_accent,c3);
  gl.uniform3fv(u.u_color_bg,bg);
  blit(null);
}

// ═══════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════
function resize(){const d=Math.min(devicePixelRatio,2);canvas.width=Math.floor(canvas.clientWidth*d);canvas.height=Math.floor(canvas.clientHeight*d);}
resize();window.addEventListener('resize',resize);

let frames=0,lfps=performance.now();
const hudEl=document.getElementById('hud');
function loop(now){
  requestAnimationFrame(loop);
  frames++;if(now-lfps>500){hudEl.textContent=Math.round(frames/((now-lfps)/1000))+' fps';frames=0;lfps=now;}
  simulate();
  displayPreset(now);
}
requestAnimationFrame(loop);

// Initial splats
setTimeout(()=>{for(let i=0;i<6;i++){const x=.15+Math.random()*.7,y=.15+Math.random()*.7,a=Math.random()*Math.PI*2,f=1500+Math.random()*2000;sq.push({x,y,dx:Math.cos(a)*f,dy:Math.sin(a)*f,color:palette.colors[i%palette.colors.length]});}},100);

// ═══════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════
const grid=document.getElementById('presetGrid');
Object.keys(PRESETS).forEach(id=>{const b=document.createElement('button');b.className='preset-btn'+(id===currentPreset?' active':'');b.textContent=PRESETS[id].name;b.dataset.id=id;b.onclick=()=>{currentPreset=id;grid.querySelectorAll('.preset-btn').forEach(x=>x.classList.toggle('active',x.dataset.id===id));};grid.appendChild(b);});

document.getElementById('speed').oninput=e=>{speed=+e.target.value;document.getElementById('speedVal').textContent=speed.toFixed(1);};
document.getElementById('intensity').oninput=e=>{intensity=+e.target.value;document.getElementById('intensityVal').textContent=intensity.toFixed(2);};
document.getElementById('complexity').oninput=e=>{complexity=+e.target.value;document.getElementById('complexityVal').textContent=complexity.toFixed(1);};

function wc(pid,tid,k){const p=document.getElementById(pid),t=document.getElementById(tid);p.oninput=()=>{colors[k]=p.value;t.value=p.value;};t.oninput=()=>{if(/^#[0-9a-fA-F]{6}$/.test(t.value)){colors[k]=t.value;p.value=t.value;}};}
wc('c1','c1t','c1');wc('c2','c2t','c2');wc('c3','c3t','c3');wc('cbg','cbgt','bg');

const bg2=document.getElementById('brandGrid');
Object.keys(PALETTES).forEach(n=>{const b=document.createElement('button');b.className='brand-btn';b.innerHTML=`<span class="brand-swatch" style="background:rgb(${PALETTES[n].colors[0].map(v=>Math.round(v*255)).join(',')})"></span>${n}`;b.onclick=()=>{palette=PALETTES[n];const p=palette;const c0=p.colors[0],c1r=p.colors[1],c2r=p.colors[2],bgr=p.bg;function f(v){return'#'+v.map(x=>Math.round(x*255).toString(16).padStart(2,'0')).join('');}colors={c1:f(c0),c2:f(c1r),c3:f(c2r),bg:f(bgr)};['c1','c2','c3','cbg'].forEach((id,i)=>{const val=[colors.c1,colors.c2,colors.c3,colors.bg][i];document.getElementById(id).value=val;document.getElementById(id+'t').value=val;});};bg2.appendChild(b);});
</script>
