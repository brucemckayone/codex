<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Hero Preset — Brush Ink</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;color:#ccc;overflow:hidden;display:flex}
#canvas-wrap{flex:1;position:relative;min-width:0;height:100vh}
canvas{width:100%;height:100%;display:block;cursor:crosshair}
.hud{position:absolute;top:12px;left:12px;font:11px/1.4 'SF Mono',Menlo,monospace;color:#6ee7b7;background:rgba(0,0,0,.65);padding:5px 10px;border-radius:4px;pointer-events:none;z-index:10}
.info{position:absolute;bottom:12px;left:12px;font:13px/1.6 system-ui;color:#888;background:rgba(0,0,0,.65);padding:8px 14px;border-radius:6px;max-width:380px;pointer-events:none;z-index:10}
.info strong{color:#bbb}
.panel{width:280px;min-width:280px;height:100vh;background:#111;border-left:1px solid #222;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.panel h2{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.panel h3{font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row label{font-size:12px;color:#999;width:72px;flex-shrink:0}
.color-row input[type=color]{width:36px;height:24px;border:1px solid #333;border-radius:3px;background:#1a1a1a;cursor:pointer;padding:0}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:1px}
.color-row input[type=color]::-webkit-color-swatch{border-radius:2px;border:none}
.color-hex{font:11px/1 monospace;color:#666;width:60px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.presets button{padding:5px 0;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#aaa;font:11px system-ui;cursor:pointer;transition:all .15s}
.presets button:hover{background:#222;border-color:#555}
.presets button.active{border-color:#7c3aed;background:#1e1b4b;color:#c4b5fd}
.slider-row{margin-bottom:8px}
.slider-row .label-row{display:flex;justify-content:space-between;margin-bottom:3px}
.slider-row label{font-size:12px;color:#999}
.slider-row .val{font:11px monospace;color:#666}
.slider-row input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#2a2a2a;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#7c3aed;border-radius:50%;cursor:pointer}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#7c3aed;border:none;border-radius:50%;cursor:pointer}
.btn-reset{margin-top:auto;padding:8px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#999;font:12px system-ui;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#2a2a2a;border-color:#555;color:#ccc}
.section{border-top:1px solid #1e1e1e;padding-top:12px}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="hud" id="hud">-- fps | 512x512</div>
  <div class="info">
    <strong>Brush Ink</strong> — Calligraphic ink diffusion on textured paper<br>
    Hover to draw. Click for ink blot.
  </div>
</div>

<div class="panel">
  <div>
    <h2>Brand Colors</h2>
    <div class="color-row">
      <label>Primary</label>
      <input type="color" id="col-primary" value="#7c3aed">
      <span class="color-hex" id="hex-primary">#7c3aed</span>
    </div>
    <div class="color-row">
      <label>Secondary</label>
      <input type="color" id="col-secondary" value="#ec4899">
      <span class="color-hex" id="hex-secondary">#ec4899</span>
    </div>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="col-accent" value="#f59e0b">
      <span class="color-hex" id="hex-accent">#f59e0b</span>
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="col-bg" value="#f5f0e8">
      <span class="color-hex" id="hex-bg">#f5f0e8</span>
    </div>
  </div>

  <div class="section">
    <h3>Presets</h3>
    <div class="presets" id="presets"></div>
  </div>

  <div class="section">
    <h3>Ink Simulation</h3>
    <div class="slider-row">
      <div class="label-row"><label>Ink Flow</label><span class="val" id="v-flow">0.35</span></div>
      <input type="range" id="s-flow" min="10" max="100" value="35" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Bleed Rate</label><span class="val" id="v-bleed">0.80</span></div>
      <input type="range" id="s-bleed" min="10" max="200" value="80" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Dry Rate</label><span class="val" id="v-dry">0.998</span></div>
      <input type="range" id="s-dry" min="950" max="999" value="998" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Brush Width</label><span class="val" id="v-brush">0.025</span></div>
      <input type="range" id="s-brush" min="10" max="100" value="25" step="1">
    </div>
  </div>

  <div class="section">
    <h3>Display</h3>
    <div class="slider-row">
      <div class="label-row"><label>Intensity</label><span class="val" id="v-intensity">0.45</span></div>
      <input type="range" id="s-intensity" min="10" max="100" value="45" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Paper Grain</label><span class="val" id="v-grain">0.040</span></div>
      <input type="range" id="s-grain" min="0" max="100" value="40" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Vignette</label><span class="val" id="v-vignette">0.15</span></div>
      <input type="range" id="s-vignette" min="0" max="60" value="15" step="1">
    </div>
  </div>

  <button class="btn-reset" id="btn-reset">Clear Paper</button>
</div>

<script>
// ================================================================
// Brush Ink — Calligraphic ink diffusion on textured paper
//
// Inspired by Shadertoy ltj3Wc ("Brush Experiment 3" by 104)
// Adapted: static calligraphy SDF → interactive mouse-driven ink sim
//
// Pass 1: Ink simulation buffer (512x512 ping-pong FBO)
//   vec4(inkDensity, velocityX, velocityY, age)
//   Diffusion, advection, mouse deposit, decay
//
// Pass 2: Display (to screen)
//   Paper grain, brush fiber texture, brand color mapping
// ================================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, depth: false, stencil: false });
if (!gl) { document.body.innerHTML = '<h1 style="padding:40px;color:red">WebGL2 required</h1>'; throw 0; }
const extCBF = gl.getExtension('EXT_color_buffer_float');
if (!extCBF) { document.body.innerHTML = '<h1 style="padding:40px;color:red">EXT_color_buffer_float required</h1>'; throw 0; }
gl.getExtension('OES_texture_float_linear');

const SIM_RES = 512;

const config = {
  inkFlow: 0.35,
  bleedRate: 0.8,
  dryRate: 0.998,
  brushWidth: 0.025,
  intensity: 0.45,
  grain: 0.04,
  vignette: 0.15,
  colors: {
    primary:   [0.486, 0.227, 0.929],
    secondary: [0.925, 0.282, 0.600],
    accent:    [0.961, 0.620, 0.043],
    bg:        [0.961, 0.941, 0.910],
  }
};

const PALETTES = {
  'Vibrant':  { primary: '#7c3aed', secondary: '#ec4899', accent: '#f59e0b', bg: '#f5f0e8' },
  'Sumi':     { primary: '#1a1a2e', secondary: '#4a4e69', accent: '#9a8c98', bg: '#f2e9e4' },
  'Ocean':    { primary: '#0c4a6e', secondary: '#0891b2', accent: '#34d399', bg: '#ecfdf5' },
  'Ember':    { primary: '#991b1b', secondary: '#c2410c', accent: '#d97706', bg: '#fef3c7' },
  'Indigo':   { primary: '#312e81', secondary: '#6366f1', accent: '#a78bfa', bg: '#eef2ff' },
  'Moss':     { primary: '#1e3a2f', secondary: '#3d6b56', accent: '#84a98c', bg: '#f0f4f0' },
};

// -- GL helpers --------------------------------------------------
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    console.error(src.split('\n').map((l,i)=>`${i+1}: ${l}`).join('\n'));
    return null;
  }
  return s;
}
function createProgram(vSrc, fSrc) {
  const p = gl.createProgram();
  const vs = compileShader(gl.VERTEX_SHADER, vSrc);
  const fs = compileShader(gl.FRAGMENT_SHADER, fSrc);
  if (!vs || !fs) return null;
  gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); return null; }
  return p;
}
function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const VS = `#version 300 es
in vec2 a_position;
out vec2 v_uv;
void main() { v_uv = a_position * 0.5 + 0.5; gl_Position = vec4(a_position, 0, 1); }`;

// ================================================================
// INIT — Clear the ink buffer to empty paper
// ================================================================
const initProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

void main() {
  // Start with empty paper: zero ink, zero velocity, zero age
  fragColor = vec4(0.0, 0.0, 0.0, 0.0);
}
`);

// ================================================================
// SIMULATION — Ink diffusion, advection, decay, mouse deposit
//
// Buffer layout: vec4(inkDensity, velocityX, velocityY, age)
//
// Algorithm:
//   1. 5-tap cross Laplacian for diffusion
//   2. Paper porosity (noise) modulates diffusion rate
//   3. Advect ink along stored velocity (backward trace)
//   4. Decay ink density (drying) and velocity (friction)
//   5. Mouse deposits ink with Gaussian falloff
//   6. Click creates larger ink splashes
// ================================================================
const simProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec2 uTexel;
uniform float uBleedRate;
uniform float uDryRate;
uniform float uBrushWidth;
uniform float uInkFlow;
uniform vec2 uMouse;
uniform vec2 uMousePrev;
uniform float uMouseActive;
uniform float uMouseSpeed;
uniform float uClickSplat;
uniform vec2 uClickPos;
uniform float uTime;

// Simple hash for paper porosity
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// Value noise for smoother porosity
float vnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

void main() {
  vec2 tx = uTexel;

  // Sample 5-tap cross neighborhood
  vec4 center = texture(uState, v_uv);
  vec4 north  = texture(uState, v_uv + vec2(0.0, tx.y));
  vec4 south  = texture(uState, v_uv - vec2(0.0, tx.y));
  vec4 east   = texture(uState, v_uv + vec2(tx.x, 0.0));
  vec4 west   = texture(uState, v_uv - vec2(tx.x, 0.0));

  // Laplacian of ink density (diffusion)
  float laplacian = (north.x + south.x + east.x + west.x) - 4.0 * center.x;

  // Paper porosity: noise modulates diffusion rate
  // Porous areas let ink spread faster
  float porosity = 0.7 + 0.6 * vnoise(v_uv * 20.0);

  // Diffusion step — gentle spread, not rapid pooling
  // Scale by ink density: dense ink spreads less (it's "setting" on paper)
  float spreadResist = 1.0 - center.x * 0.6;
  float diffusion = laplacian * uBleedRate * 0.035 * porosity * spreadResist;

  // Backward advection: trace where this ink came from
  vec2 vel = center.yz;
  vec2 advUv = v_uv - vel * tx * 1.5;
  vec4 advected = texture(uState, advUv);

  // Blend current density with advected — low blend keeps strokes intact
  float ink = mix(center.x, advected.x, 0.08) + diffusion;

  // Decay: ink dries slowly
  ink *= uDryRate;

  // Velocity decays faster — ink settles on paper quickly
  vel *= 0.88;

  // Very slight velocity diffusion for smoother edges
  vec2 velLapl = (north.yz + south.yz + east.yz + west.yz) - 4.0 * center.yz;
  vel += velLapl * 0.02;

  // Age: increment (used for color mapping in display)
  float age = center.w + 0.001;

  // Mouse interaction: deposit ink
  if (uMouseActive > 0.5) {
    vec2 mouseUv = uMouse;

    // Speed is in UV space (~0.001-0.02 typical), scale up for meaningful variation
    float speed = clamp(uMouseSpeed * 60.0, 0.0, 1.0);

    // Brush radius: slow = wider, fast = thinner (calligraphic feel)
    float speedThin = 1.0 - speed * 0.6;
    float radius = uBrushWidth * speedThin;

    // Line segment coverage: deposit ink along the path between prev and current
    // This prevents gaps when moving fast
    vec2 seg = uMouse - uMousePrev;
    float segLen = length(seg);

    // Distance to the line segment (or point if stationary)
    float dist;
    if (segLen > 0.0005) {
      vec2 segDir = seg / segLen;
      vec2 toPixel = v_uv - uMousePrev;
      float proj = clamp(dot(toPixel, segDir), 0.0, segLen);
      vec2 closest = uMousePrev + segDir * proj;
      dist = length(v_uv - closest);
    } else {
      dist = length(v_uv - mouseUv);
    }

    // Gaussian falloff from stroke centerline
    float falloff = exp(-dist * dist / (radius * radius + 0.00001));

    // Ink deposit: flow amount modulated by brush contact
    float deposit = uInkFlow * falloff * (0.4 + 0.6 * speedThin);

    // Add directional velocity from mouse movement
    if (segLen > 0.0001) {
      vec2 dir = seg / segLen;
      vel += dir * falloff * 0.25 * min(speed + 0.1, 0.5);
    }

    ink = min(ink + deposit, 1.0);
  }

  // Click splat: larger ink blot
  if (uClickSplat > 0.0) {
    float dist = length(v_uv - uClickPos);
    float splatRadius = uBrushWidth * 4.0;

    // Irregular splat shape using noise
    float noiseOffset = vnoise(v_uv * 40.0 + uTime * 0.5) * 0.4;
    float splatFalloff = exp(-(dist - noiseOffset * splatRadius) * (dist - noiseOffset * splatRadius) / (splatRadius * splatRadius));
    float splatInk = uClickSplat * uInkFlow * 1.5 * splatFalloff;

    // Radial velocity from splat center
    if (dist > 0.001) {
      vel += normalize(v_uv - uClickPos) * splatFalloff * 0.15 * uClickSplat;
    }

    ink = min(ink + splatInk, 1.0);
    age = mix(age, 0.0, splatFalloff * uClickSplat * 0.5);
  }

  // Clamp
  ink = clamp(ink, 0.0, 1.0);
  vel = clamp(vel, -0.5, 0.5);
  age = clamp(age, 0.0, 1.0);

  fragColor = vec4(ink, vel, age);
}
`);
const simU = getUniforms(simProg, [
  'uState', 'uTexel', 'uBleedRate', 'uDryRate', 'uBrushWidth', 'uInkFlow',
  'uMouse', 'uMousePrev', 'uMouseActive', 'uMouseSpeed',
  'uClickSplat', 'uClickPos', 'uTime'
]);

// ================================================================
// DISPLAY — Paper + ink compositing with brush fiber texture
//
// Reads ink buffer and composites onto textured paper:
//   - Paper grain (low-frequency noise, subtle brightness variation)
//   - Brush fiber texture (high-frequency directional noise)
//   - Ink density mapped to brand palette (dense -> primary, thin -> secondary)
//   - Feathered ink edges via smoothstep
//   - Film grain + vignette post-process
// ================================================================
const displayProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec3 uColorPrimary, uColorSecondary, uColorAccent, uBgColor;
uniform float uIntensity, uGrain, uVignette, uTime;

float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

float vnoise(vec2 p) {
  vec2 i = floor(p);
  vec2 f = fract(p);
  f = f * f * (3.0 - 2.0 * f);
  float a = hash(i);
  float b = hash(i + vec2(1.0, 0.0));
  float c = hash(i + vec2(0.0, 1.0));
  float d = hash(i + vec2(1.0, 1.0));
  return mix(mix(a, b, f.x), mix(c, d, f.x), f.y);
}

// 2-octave FBM for paper grain (performance-friendly)
float fbm(vec2 p) {
  float v = vnoise(p) * 0.6 + vnoise(p * 2.0 + 100.0) * 0.4;
  return v;
}

void main() {
  vec4 state = texture(uState, v_uv);
  float ink = state.x;
  vec2 vel = state.yz;
  float age = state.w;

  // -- Paper background --
  // Low-frequency grain: subtle brightness variation like real paper fibers
  float paperGrain = fbm(v_uv * 50.0) * uGrain;
  // Very high frequency fiber texture
  float paperFiber = (hash(v_uv * 2048.0 + fract(uTime * 0.01)) - 0.5) * 0.01;

  vec3 paper = uBgColor + (paperGrain - uGrain * 0.5) + paperFiber;

  // -- Brush fiber texture --
  // Only compute fibers where there's actually ink (avoids NaN from atan(0,0))
  float velMag = length(vel);
  float fiber = 0.0;

  if (ink > 0.005) {
    float velAngle = velMag > 0.001 ? atan(vel.y, vel.x) : 0.0;

    // Directional fibers: stretch noise along velocity direction
    vec2 fiberUv = v_uv * 150.0;
    float ca = cos(velAngle), sa = sin(velAngle);
    vec2 rotFiber = vec2(
      fiberUv.x * ca - fiberUv.y * sa,
      fiberUv.x * sa + fiberUv.y * ca
    );
    // Stretch along stroke direction for calligraphic feel
    rotFiber.x *= 0.25 + 0.75 * (1.0 - min(velMag * 3.0, 0.9));

    // Two-octave noise with offset to break grid regularity
    float fiberNoise = vnoise(rotFiber + 17.3) * 0.3
                     + vnoise(rotFiber * 2.7 + 31.7) * 0.15;
    fiber = fiberNoise * ink * (0.3 + velMag * 1.5);
  }

  // -- Ink color mapping --
  // Dense fresh ink: primary color (darkest)
  // Spreading/bleeding ink: secondary color
  // Faint dried traces: accent color (very subtle)

  // Feathered density for soft ink edges
  float softInk = smoothstep(0.0, 0.06, ink);
  float medInk = smoothstep(0.06, 0.25, ink);
  float denseInk = smoothstep(0.25, 0.6, ink);

  // Age affects color: fresh ink is more saturated, dried ink fades
  float freshness = 1.0 - age * 0.3;

  // Build ink color from palette layers
  // Faintest wash: secondary tinted with accent; medium: secondary; dense: primary
  vec3 washColor = mix(uColorSecondary, uColorAccent, 0.3) * 0.65;
  vec3 midColor = uColorSecondary * 0.7;
  vec3 coreColor = uColorPrimary * 0.7;

  vec3 inkColor = mix(washColor, midColor, medInk);
  inkColor = mix(inkColor, coreColor, denseInk);

  // Freshness boost: recently deposited ink slightly more vivid
  inkColor *= 0.85 + 0.15 * freshness;

  // Add brush fiber variation — subtle color streaking
  inkColor += fiber * 0.1 * (uColorPrimary - uColorSecondary);

  // -- Paper bleed effect --
  // At low densities, ink absorbs unevenly into paper fibers
  float bleedNoise = vnoise(v_uv * 80.0 + vel * 5.0);
  float bleedMask = smoothstep(0.0, 0.12, ink) * (0.8 + 0.2 * bleedNoise);

  // -- Composite --
  // Ink is ABSORBED into paper, not sitting on top
  float inkOpacity = softInk * uIntensity * bleedMask;
  // Power curve gives natural ink absorption: faint at edges, opaque at center
  inkOpacity = pow(max(inkOpacity, 0.0), 0.75);
  inkOpacity = min(inkOpacity, 0.75);  // Max 75% opacity — ink absorbed, not fully opaque

  // When no ink, skip mix to avoid any NaN propagation
  vec3 color = inkOpacity > 0.001 ? mix(paper, inkColor, inkOpacity) : paper;

  // -- Vignette (subtle, additive darkening so light paper stays readable) --
  vec2 vc = v_uv * 2.0 - 1.0;
  float vignetteMask = dot(vc, vc) * uVignette;
  color -= vignetteMask * 0.15;  // Subtle subtractive vignette, not multiplicative

  // -- Film grain --
  float grain = (hash(v_uv * 512.0 + fract(uTime * 7.13)) - 0.5) * 0.02;
  color += grain;

  fragColor = vec4(clamp(color, 0.0, 1.0), 1.0);
}
`);
const displayU = getUniforms(displayProg, [
  'uState', 'uColorPrimary', 'uColorSecondary', 'uColorAccent', 'uBgColor',
  'uIntensity', 'uGrain', 'uVignette', 'uTime'
]);

// -- Quad --------------------------------------------------------
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQuad(prog) {
  const a = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
}

// -- Double FBO --------------------------------------------------
function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex, w, h };
}
function createDoubleFBO(w, h) {
  let a = createFBO(w, h), b = createFBO(w, h);
  return { get read(){return a}, get write(){return b}, swap(){[a,b]=[b,a]} };
}

let simBuf = createDoubleFBO(SIM_RES, SIM_RES);

// -- Init --------------------------------------------------------
function initSim() {
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(initProg);
  bindQuad(initProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.read.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// -- Mouse -------------------------------------------------------
let mouse = { x: 0, y: 0, prevX: 0, prevY: 0, active: false, speed: 0 };
let clickSplat = { active: false, x: 0, y: 0, strength: 0 };

function updateMouse(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const nx = (clientX - rect.left) / rect.width;
  const ny = 1.0 - (clientY - rect.top) / rect.height;
  mouse.prevX = mouse.x;
  mouse.prevY = mouse.y;
  mouse.x = nx;
  mouse.y = ny;
  const dx = mouse.x - mouse.prevX;
  const dy = mouse.y - mouse.prevY;
  mouse.speed = Math.sqrt(dx * dx + dy * dy);
  mouse.active = true;
}

canvas.addEventListener('mousemove', e => updateMouse(e.clientX, e.clientY));
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('mouseenter', e => {
  updateMouse(e.clientX, e.clientY);
  // Reset prev to current to prevent jump trail
  mouse.prevX = mouse.x;
  mouse.prevY = mouse.y;
  mouse.speed = 0;
});

canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  clickSplat.x = (e.clientX - rect.left) / rect.width;
  clickSplat.y = 1.0 - (e.clientY - rect.top) / rect.height;
  clickSplat.strength = 1.0;
  clickSplat.active = true;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateMouse(t.clientX, t.clientY);
  mouse.prevX = mouse.x;
  mouse.prevY = mouse.y;
  mouse.speed = 0;
  // Also trigger a small splat on touch start
  clickSplat.x = mouse.x;
  clickSplat.y = mouse.y;
  clickSplat.strength = 0.6;
  clickSplat.active = true;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  updateMouse(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// -- Resize ------------------------------------------------------
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
}
window.addEventListener('resize', resize);
resize();

// -- Sim step ----------------------------------------------------
function stepSim(time) {
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(simProg);
  bindQuad(simProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(simU.uState, 0);

  const tx = 1.0 / SIM_RES;
  gl.uniform2f(simU.uTexel, tx, tx);
  gl.uniform1f(simU.uBleedRate, config.bleedRate);
  gl.uniform1f(simU.uDryRate, config.dryRate);
  gl.uniform1f(simU.uBrushWidth, config.brushWidth);
  gl.uniform1f(simU.uInkFlow, config.inkFlow);
  gl.uniform2f(simU.uMouse, mouse.x, mouse.y);
  gl.uniform2f(simU.uMousePrev, mouse.prevX, mouse.prevY);
  gl.uniform1f(simU.uMouseActive, mouse.active ? 1.0 : 0.0);
  gl.uniform1f(simU.uMouseSpeed, mouse.speed);
  gl.uniform1f(simU.uTime, time * 0.001);

  // Click splat decays over frames
  if (clickSplat.active) {
    gl.uniform1f(simU.uClickSplat, clickSplat.strength);
    gl.uniform2f(simU.uClickPos, clickSplat.x, clickSplat.y);
    clickSplat.strength *= 0.85;
    if (clickSplat.strength < 0.01) clickSplat.active = false;
  } else {
    gl.uniform1f(simU.uClickSplat, 0.0);
    gl.uniform2f(simU.uClickPos, -10.0, -10.0);
  }

  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  simBuf.swap();
}

// -- Display -----------------------------------------------------
function display(time) {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(displayProg);
  bindQuad(displayProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(displayU.uState, 0);

  const c = config.colors;
  gl.uniform3fv(displayU.uColorPrimary, c.primary);
  gl.uniform3fv(displayU.uColorSecondary, c.secondary);
  gl.uniform3fv(displayU.uColorAccent, c.accent);
  gl.uniform3fv(displayU.uBgColor, c.bg);
  gl.uniform1f(displayU.uIntensity, config.intensity);
  gl.uniform1f(displayU.uGrain, config.grain);
  gl.uniform1f(displayU.uVignette, config.vignette);
  gl.uniform1f(displayU.uTime, time * 0.001);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// -- Main loop ---------------------------------------------------
let fpsCount = 0, fpsTime = 0, fpsVal = 0;

function frame(time) {
  requestAnimationFrame(frame);

  // FPS counter
  fpsCount++;
  if (time - fpsTime > 1000) {
    fpsVal = Math.round(fpsCount * 1000 / (time - fpsTime));
    fpsTime = time; fpsCount = 0;
    document.getElementById('hud').textContent = `${fpsVal} fps | ${SIM_RES}x${SIM_RES}`;
  }

  stepSim(time);
  display(time);
}

// -- UI ----------------------------------------------------------
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}

['primary','secondary','accent','bg'].forEach(key => {
  const inp = document.getElementById(`col-${key}`);
  const hex = document.getElementById(`hex-${key}`);
  inp.addEventListener('input', () => {
    config.colors[key] = hexToRgb(inp.value);
    hex.textContent = inp.value;
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  });
});

const presetsEl = document.getElementById('presets');
Object.entries(PALETTES).forEach(([name, pal]) => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    config.colors.primary = hexToRgb(pal.primary);
    config.colors.secondary = hexToRgb(pal.secondary);
    config.colors.accent = hexToRgb(pal.accent);
    config.colors.bg = hexToRgb(pal.bg);
    ['primary','secondary','accent','bg'].forEach(k => {
      document.getElementById(`col-${k}`).value = pal[k];
      document.getElementById(`hex-${k}`).textContent = pal[k];
    });
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  if (name === 'Vibrant') btn.classList.add('active');
  presetsEl.appendChild(btn);
});

function wireSlider(id, key, xform, fmt) {
  const s = document.getElementById(`s-${id}`);
  const d = document.getElementById(`v-${id}`);
  s.addEventListener('input', () => {
    const v = xform(+s.value);
    config[key] = v;
    d.textContent = fmt(v);
  });
}
wireSlider('flow',      'inkFlow',    v=>v/100,    v=>v.toFixed(2));
wireSlider('bleed',     'bleedRate',  v=>v/100,    v=>v.toFixed(2));
wireSlider('dry',       'dryRate',    v=>v/1000,   v=>v.toFixed(3));
wireSlider('brush',     'brushWidth', v=>v/1000,   v=>v.toFixed(3));
wireSlider('intensity', 'intensity',  v=>v/100,    v=>v.toFixed(2));
wireSlider('grain',     'grain',      v=>v/1000,   v=>v.toFixed(3));
wireSlider('vignette',  'vignette',   v=>v/100,    v=>v.toFixed(2));

document.getElementById('btn-reset').addEventListener('click', initSim);

// -- Boot --------------------------------------------------------
initSim();
requestAnimationFrame(frame);
</script>
</body>
</html>
