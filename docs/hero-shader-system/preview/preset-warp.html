<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Hero Preset — Domain Warp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;color:#ccc;overflow:hidden;display:flex}
#canvas-wrap{flex:1;position:relative;min-width:0;height:100vh}
canvas{width:100%;height:100%;display:block;cursor:crosshair}
.hud{position:absolute;top:12px;left:12px;font:11px/1.4 'SF Mono',Menlo,monospace;color:#6ee7b7;background:rgba(0,0,0,.65);padding:5px 10px;border-radius:4px;pointer-events:none;z-index:10}
.info{position:absolute;bottom:12px;left:12px;font:13px/1.6 system-ui;color:#888;background:rgba(0,0,0,.65);padding:8px 14px;border-radius:6px;max-width:380px;pointer-events:none;z-index:10}
.info strong{color:#bbb}
.panel{width:280px;min-width:280px;height:100vh;background:#111;border-left:1px solid #222;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.panel h2{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.panel h3{font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row label{font-size:12px;color:#999;width:72px;flex-shrink:0}
.color-row input[type=color]{width:36px;height:24px;border:1px solid #333;border-radius:3px;background:#1a1a1a;cursor:pointer;padding:0}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:1px}
.color-row input[type=color]::-webkit-color-swatch{border-radius:2px;border:none}
.color-hex{font:11px/1 monospace;color:#666;width:60px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.presets button{padding:5px 0;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#aaa;font:11px system-ui;cursor:pointer;transition:all .15s}
.presets button:hover{background:#222;border-color:#555}
.presets button.active{border-color:#7c3aed;background:#1e1b4b;color:#c4b5fd}
.slider-row{margin-bottom:8px}
.slider-row .label-row{display:flex;justify-content:space-between;margin-bottom:3px}
.slider-row label{font-size:12px;color:#999}
.slider-row .val{font:11px monospace;color:#666}
.slider-row input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#2a2a2a;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#7c3aed;border-radius:50%;cursor:pointer}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#7c3aed;border:none;border-radius:50%;cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.toggle-row label{font-size:12px;color:#999}
.toggle-row input[type=checkbox]{width:16px;height:16px;accent-color:#7c3aed;cursor:pointer}
.btn-reset{margin-top:auto;padding:8px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#999;font:12px system-ui;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#2a2a2a;border-color:#555;color:#ccc}
.section{border-top:1px solid #1e1e1e;padding-top:12px}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="hud" id="hud">-- fps</div>
  <div class="info">
    <strong>Domain Warp</strong> — Recursive FBM warping with bump-mapped lighting<br>
    Move mouse to explore. Cursor intensifies warping nearby.
  </div>
</div>

<div class="panel">
  <div>
    <h2>Brand Colors</h2>
    <div class="color-row">
      <label>Primary</label>
      <input type="color" id="col-primary" value="#7c3aed">
      <span class="color-hex" id="hex-primary">#7c3aed</span>
    </div>
    <div class="color-row">
      <label>Secondary</label>
      <input type="color" id="col-secondary" value="#ec4899">
      <span class="color-hex" id="hex-secondary">#ec4899</span>
    </div>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="col-accent" value="#f59e0b">
      <span class="color-hex" id="hex-accent">#f59e0b</span>
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="col-bg" value="#0f172a">
      <span class="color-hex" id="hex-bg">#0f172a</span>
    </div>
  </div>

  <div class="section">
    <h3>Presets</h3>
    <div class="presets" id="presets"></div>
  </div>

  <div class="section">
    <h3>Warp</h3>
    <div class="slider-row">
      <div class="label-row"><label>Warp Strength</label><span class="val" id="v-warpstr">1.50</span></div>
      <input type="range" id="s-warpstr" min="50" max="300" value="150" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Detail (octaves)</label><span class="val" id="v-detail">4</span></div>
      <input type="range" id="s-detail" min="2" max="6" value="4" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Anim Speed</label><span class="val" id="v-speed">0.30</span></div>
      <input type="range" id="s-speed" min="10" max="100" value="30" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Light Angle</label><span class="val" id="v-lightang">135</span></div>
      <input type="range" id="s-lightang" min="0" max="360" value="135" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Contrast</label><span class="val" id="v-contrast">1.10</span></div>
      <input type="range" id="s-contrast" min="50" max="200" value="110" step="1">
    </div>
  </div>

  <div class="section">
    <h3>Display</h3>
    <div class="toggle-row">
      <label>Invert</label>
      <input type="checkbox" id="t-invert" checked>
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Intensity</label><span class="val" id="v-intensity">0.45</span></div>
      <input type="range" id="s-intensity" min="10" max="100" value="45" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Grain</label><span class="val" id="v-grain">0.025</span></div>
      <input type="range" id="s-grain" min="0" max="80" value="25" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Vignette</label><span class="val" id="v-vignette">0.20</span></div>
      <input type="range" id="s-vignette" min="0" max="50" value="20" step="1">
    </div>
  </div>

  <button class="btn-reset" id="btn-reset">Reset Defaults</button>
</div>

<script>
// ===================================================================
// Domain Warp — Recursive FBM warping with bump-mapped lighting
//
// Technique: fbm(p + fbm(p + fbm(p))) — fractal Brownian motion
// applied recursively to its own UV domain, creating organic
// marble/cloud/lava textures. Combined with bump-mapped lighting
// for 3D depth.
//
// Single-pass fragment shader. No FBOs needed.
// Mouse interaction: parallax, time distortion, warp magnification.
// ===================================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, depth: false, stencil: false });
if (!gl) { document.body.innerHTML = '<h1 style="padding:40px;color:red">WebGL2 required</h1>'; throw 0; }

const config = {
  warpStr: 1.50,
  detail: 4,
  speed: 0.30,
  lightAng: 135,
  contrast: 1.10,
  invert: true,
  intensity: 0.45,
  grain: 0.025,
  vignette: 0.20,
  colors: {
    primary:   [0.486, 0.227, 0.929],
    secondary: [0.925, 0.282, 0.600],
    accent:    [0.961, 0.620, 0.043],
    bg:        [0.059, 0.090, 0.165],
  }
};

const PALETTES = {
  'Vibrant': { primary: '#7c3aed', secondary: '#ec4899', accent: '#f59e0b', bg: '#0f172a' },
  'Neon':    { primary: '#22d3ee', secondary: '#a3e635', accent: '#f472b6', bg: '#09090b' },
  'Ocean':   { primary: '#0284c7', secondary: '#0891b2', accent: '#34d399', bg: '#0c4a6e' },
  'Sunset':  { primary: '#e11d48', secondary: '#f97316', accent: '#fbbf24', bg: '#1c1917' },
  'Ember':   { primary: '#dc2626', secondary: '#ea580c', accent: '#fcd34d', bg: '#1c1917' },
  'Mono':    { primary: '#e5e5e5', secondary: '#a3a3a3', accent: '#525252', bg: '#0a0a0a' },
};

// -- GL helpers ---------------------------------------------------
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    console.error(src.split('\n').map((l,i) => `${i+1}: ${l}`).join('\n'));
    return null;
  }
  return s;
}
function createProgram(vSrc, fSrc) {
  const p = gl.createProgram();
  const vs = compileShader(gl.VERTEX_SHADER, vSrc);
  const fs = compileShader(gl.FRAGMENT_SHADER, fSrc);
  if (!vs || !fs) return null;
  gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); return null; }
  return p;
}
function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const VS = `#version 300 es
in vec2 a_position;
out vec2 v_uv;
void main() { v_uv = a_position * 0.5 + 0.5; gl_Position = vec4(a_position, 0, 1); }`;

// ==================================================================
// DOMAIN WARP FRAGMENT SHADER
//
// Core technique: recursive FBM domain warping
//   - hash() -> noise() -> fbm() with inter-octave rotation
//   - warpedPattern() applies fbm(p + fbm(p + fbm(p)))
//   - Bump-mapped lighting via finite differences on the warp field
//   - Brand color mapping from intermediate warp vectors (q, r)
//
// Mouse interaction:
//   A. View offset (parallax) — shift UV origin
//   B. Time distortion — mouse X modulates animation phase
//   C. Warp magnification — cursor proximity boosts warp strength
//
// Post-processing: Reinhard tone map, grain, vignette, brightness cap
// ==================================================================
const warpProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform float u_time;
uniform vec2 u_resolution;
uniform vec2 u_mouse;
uniform vec3 u_brandPrimary;
uniform vec3 u_brandSecondary;
uniform vec3 u_brandAccent;
uniform vec3 u_bgColor;
uniform float u_warpStr;
uniform int u_detail;
uniform float u_speed;
uniform float u_lightAng;
uniform float u_contrast;
uniform float u_invert;
uniform float u_intensity;
uniform float u_grain;
uniform float u_vignette;

// -- Hash for film grain (pseudo-random, screen-space) --
float hash(vec2 p) {
  vec3 p3 = fract(vec3(p.xyx) * 0.1031);
  p3 += dot(p3, p3.yzx + 33.33);
  return fract((p3.x + p3.y) * p3.z);
}

// -- Noise: smooth periodic function (the key to the organic look) --
float noise(vec2 p) {
  return sin(p.x) * sin(p.y);
}

// -- FBM with rotation between octaves to break axis alignment -----
const mat2 octaveRot = mat2(0.8, 0.6, -0.6, 0.8);

// FBM with 4 octaves, normalized by /0.9375
float fbm4(vec2 p) {
  float f = 0.0;
  f += 0.5000 * noise(p); p = octaveRot * p * 2.02;
  f += 0.2500 * noise(p); p = octaveRot * p * 2.03;
  f += 0.1250 * noise(p); p = octaveRot * p * 2.01;
  f += 0.0625 * noise(p);
  return f / 0.9375;
}

// FBM with 6 octaves, each remapped to 0..1, normalized by /0.96875
float fbm6(vec2 p) {
  float f = 0.0;
  f += 0.500000 * (0.5 + 0.5 * noise(p)); p = octaveRot * p * 2.02;
  f += 0.250000 * (0.5 + 0.5 * noise(p)); p = octaveRot * p * 2.03;
  f += 0.125000 * (0.5 + 0.5 * noise(p)); p = octaveRot * p * 2.01;
  f += 0.062500 * (0.5 + 0.5 * noise(p)); p = octaveRot * p * 2.04;
  f += 0.031250 * (0.5 + 0.5 * noise(p)); p = octaveRot * p * 2.01;
  f += 0.015625 * (0.5 + 0.5 * noise(p));
  return f / 0.96875;
}

// -- Domain warping function: fbm(p + fbm(p + fbm(p))) -----------
float func(vec2 p, float time, float warpStr, out vec2 oq, out vec2 or2) {
  // Time-based sway
  p += 0.03 * sin(vec2(0.27, 0.23) * time + length(p) * vec2(4.1, 4.3));

  // First warp layer
  vec2 q = vec2(
    fbm4(p * 0.9),
    fbm4(p * 0.9 + vec2(7.8))
  );

  // Time modulate q
  q += 0.04 * sin(vec2(0.12, 0.14) * time + length(q));

  // Second warp layer
  vec2 r = vec2(
    fbm6(q * 3.0),
    fbm6(q * 3.0 + vec2(11.5))
  );

  // Export for color mapping
  oq = q;
  or2 = r;

  // Final evaluation
  float f = 0.5 + 0.5 * fbm4(p * 1.8 + r * 6.0);

  // Contrast shaping
  return mix(f, f * f * f * 3.5, f * abs(r.x));
}

void main() {
  float t = u_time * u_speed;

  // --- Mouse interaction: parallax offset ---
  vec2 p = (2.0 * gl_FragCoord.xy - u_resolution) / u_resolution.y;
  p += (u_mouse - 0.5) * 1.5;

  // --- Mouse interaction: time distortion ---
  float localTime = t + u_mouse.x * 2.0;

  // --- Mouse interaction: warp magnification near cursor ---
  vec2 uv = gl_FragCoord.xy / u_resolution;
  float mouseDist = distance(uv, u_mouse);
  float mouseWarp = smoothstep(0.4, 0.0, mouseDist) * 0.5;
  float effectiveWarp = u_warpStr * (1.0 + mouseWarp);

  // --- Evaluate the warped pattern ---
  vec2 q, r;
  float f = func(p, localTime, effectiveWarp, q, r);

  // --- Bump-mapped lighting via finite differences ---
  float eps = 2.0 / u_resolution.y;
  vec2 dq, dr;
  float fx = func(p + vec2(eps, 0.0), localTime, effectiveWarp, dq, dr);
  float fy = func(p + vec2(0.0, eps), localTime, effectiveWarp, dq, dr);

  vec3 nor = normalize(vec3(fx - f, 2.0 * eps, fy - f));

  // Light direction from configurable angle
  float angRad = u_lightAng * 3.14159265 / 180.0;
  vec3 lig = normalize(vec3(cos(angRad), 0.2, sin(angRad)));
  float dif = clamp(0.3 + 0.7 * dot(nor, lig), 0.0, 1.0);

  // --- Color mapping (4 layers using brand colors) ---
  vec3 color = mix(u_brandPrimary * 0.4, u_brandSecondary * 0.1, f);
  color = mix(color, vec3(0.9), dot(r, r));
  color = mix(color, u_brandAccent * 0.6, 0.2 + 0.5 * q.y * q.y);
  color = mix(color, u_brandPrimary * 0.8, 0.5 * smoothstep(1.2, 1.3, abs(r.x) + abs(r.y)));
  color = clamp(color * f * 2.0, 0.0, 1.0);

  // --- Lighting application ---
  vec3 lin = vec3(0.70, 0.90, 0.95) * (nor.y * 0.5 + 0.5)
           + vec3(0.15, 0.10, 0.05) * dif;
  color *= 1.2 * lin;

  // --- Invert + contrast ---
  color = mix(color, 1.0 - color, u_invert);
  color = 1.1 * color * color * u_contrast;

  // --- Post-processing ---

  // Reinhard tone map
  color = color / (1.0 + color);

  // Brightness cap at 75%
  color = min(color, vec3(0.75));

  // Mix with background by intensity
  color = mix(u_bgColor, color, u_intensity);

  // Vignette
  vec2 vc = v_uv * 2.0 - 1.0;
  color *= clamp(1.0 - dot(vc, vc) * u_vignette, 0.0, 1.0);

  // Film grain
  color += (hash(gl_FragCoord.xy + fract(u_time * 7.13)) - 0.5) * u_grain;

  fragColor = vec4(clamp(color, 0.0, 0.75), 1.0);
}
`);
const warpU = getUniforms(warpProg, [
  'u_time', 'u_resolution', 'u_mouse',
  'u_brandPrimary', 'u_brandSecondary', 'u_brandAccent', 'u_bgColor',
  'u_warpStr', 'u_detail', 'u_speed', 'u_lightAng', 'u_contrast',
  'u_invert', 'u_intensity', 'u_grain', 'u_vignette'
]);

// -- Quad ---------------------------------------------------------
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQuad(prog) {
  const a = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
}

// -- Mouse (lerped for smoothness) --------------------------------
let mouseRaw = { x: 0.5, y: 0.5 };
let mouseLerped = { x: 0.5, y: 0.5 };
const MOUSE_LERP = 0.04;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseRaw.x = (e.clientX - rect.left) / rect.width;
  mouseRaw.y = 1.0 - (e.clientY - rect.top) / rect.height;
});
canvas.addEventListener('mouseleave', () => {
  mouseRaw.x = 0.5;
  mouseRaw.y = 0.5;
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseRaw.x = (t.clientX - rect.left) / rect.width;
  mouseRaw.y = 1.0 - (t.clientY - rect.top) / rect.height;
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseRaw.x = (t.clientX - rect.left) / rect.width;
  mouseRaw.y = 1.0 - (t.clientY - rect.top) / rect.height;
}, { passive: false });
canvas.addEventListener('touchend', () => {
  mouseRaw.x = 0.5;
  mouseRaw.y = 0.5;
});

// -- Resize -------------------------------------------------------
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
}
window.addEventListener('resize', resize);
resize();

// -- Render -------------------------------------------------------
let fpsCount = 0, fpsTime = 0, fpsVal = 0;
let startTime = 0;

function frame(time) {
  requestAnimationFrame(frame);

  if (!startTime) startTime = time;
  const elapsed = (time - startTime) * 0.001;

  // FPS counter
  fpsCount++;
  if (time - fpsTime > 1000) {
    fpsVal = Math.round(fpsCount * 1000 / (time - fpsTime));
    fpsTime = time; fpsCount = 0;
    document.getElementById('hud').textContent =
      `${fpsVal} fps | ${canvas.width}x${canvas.height} | ${config.detail} oct`;
  }

  // Lerp mouse for smooth interaction
  mouseLerped.x += (mouseRaw.x - mouseLerped.x) * MOUSE_LERP;
  mouseLerped.y += (mouseRaw.y - mouseLerped.y) * MOUSE_LERP;

  // Draw
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(warpProg);
  bindQuad(warpProg);

  gl.uniform1f(warpU.u_time, elapsed);
  gl.uniform2f(warpU.u_resolution, canvas.width, canvas.height);
  gl.uniform2f(warpU.u_mouse, mouseLerped.x, mouseLerped.y);

  const c = config.colors;
  gl.uniform3fv(warpU.u_brandPrimary, c.primary);
  gl.uniform3fv(warpU.u_brandSecondary, c.secondary);
  gl.uniform3fv(warpU.u_brandAccent, c.accent);
  gl.uniform3fv(warpU.u_bgColor, c.bg);

  gl.uniform1f(warpU.u_warpStr, config.warpStr);
  gl.uniform1i(warpU.u_detail, config.detail);
  gl.uniform1f(warpU.u_speed, config.speed);
  gl.uniform1f(warpU.u_lightAng, config.lightAng);
  gl.uniform1f(warpU.u_contrast, config.contrast);
  gl.uniform1f(warpU.u_invert, config.invert ? 1.0 : 0.0);
  gl.uniform1f(warpU.u_intensity, config.intensity);
  gl.uniform1f(warpU.u_grain, config.grain);
  gl.uniform1f(warpU.u_vignette, config.vignette);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// -- UI -----------------------------------------------------------
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}

['primary','secondary','accent','bg'].forEach(key => {
  const inp = document.getElementById(`col-${key}`);
  const hex = document.getElementById(`hex-${key}`);
  inp.addEventListener('input', () => {
    config.colors[key] = hexToRgb(inp.value);
    hex.textContent = inp.value;
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  });
});

const presetsEl = document.getElementById('presets');
Object.entries(PALETTES).forEach(([name, pal]) => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    config.colors.primary = hexToRgb(pal.primary);
    config.colors.secondary = hexToRgb(pal.secondary);
    config.colors.accent = hexToRgb(pal.accent);
    config.colors.bg = hexToRgb(pal.bg);
    ['primary','secondary','accent','bg'].forEach(k => {
      document.getElementById(`col-${k}`).value = pal[k];
      document.getElementById(`hex-${k}`).textContent = pal[k];
    });
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  if (name === 'Vibrant') btn.classList.add('active');
  presetsEl.appendChild(btn);
});

function wireSlider(id, key, xform, fmt) {
  const s = document.getElementById(`s-${id}`);
  const d = document.getElementById(`v-${id}`);
  s.addEventListener('input', () => {
    const v = xform(+s.value);
    config[key] = v;
    d.textContent = fmt(v);
  });
}
wireSlider('warpstr',   'warpStr',   v => v / 100,  v => v.toFixed(2));
wireSlider('detail',    'detail',    v => v,         v => v.toFixed(0));
wireSlider('speed',     'speed',     v => v / 100,   v => v.toFixed(2));
wireSlider('lightang',  'lightAng',  v => v,         v => v.toFixed(0));
wireSlider('contrast',  'contrast',  v => v / 100,   v => v.toFixed(2));
wireSlider('intensity', 'intensity', v => v / 100,   v => v.toFixed(2));
wireSlider('grain',     'grain',     v => v / 1000,  v => v.toFixed(3));
wireSlider('vignette',  'vignette',  v => v / 100,   v => v.toFixed(2));

// Invert toggle
document.getElementById('t-invert').addEventListener('change', e => {
  config.invert = e.target.checked;
});

// -- Reset --------------------------------------------------------
document.getElementById('btn-reset').addEventListener('click', () => {
  config.warpStr = 1.50;
  config.detail = 4;
  config.speed = 0.30;
  config.lightAng = 135;
  config.contrast = 1.10;
  config.invert = true;
  config.intensity = 0.45;
  config.grain = 0.025;
  config.vignette = 0.20;

  // Reset colors to Vibrant
  const pal = PALETTES['Vibrant'];
  config.colors.primary = hexToRgb(pal.primary);
  config.colors.secondary = hexToRgb(pal.secondary);
  config.colors.accent = hexToRgb(pal.accent);
  config.colors.bg = hexToRgb(pal.bg);
  ['primary','secondary','accent','bg'].forEach(k => {
    document.getElementById(`col-${k}`).value = pal[k];
    document.getElementById(`hex-${k}`).textContent = pal[k];
  });
  document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  presetsEl.querySelector('button').classList.add('active');

  // Reset sliders
  const sliderDefaults = {
    warpstr: 150, detail: 4, speed: 30, lightang: 135, contrast: 110,
    intensity: 45, grain: 25, vignette: 20
  };
  for (const [id, val] of Object.entries(sliderDefaults)) {
    document.getElementById(`s-${id}`).value = val;
  }

  // Reset displayed values
  document.getElementById('v-warpstr').textContent = '1.50';
  document.getElementById('v-detail').textContent = '4';
  document.getElementById('v-speed').textContent = '0.30';
  document.getElementById('v-lightang').textContent = '135';
  document.getElementById('v-contrast').textContent = '1.10';
  document.getElementById('v-intensity').textContent = '0.45';
  document.getElementById('v-grain').textContent = '0.025';
  document.getElementById('v-vignette').textContent = '0.20';

  // Reset toggle
  document.getElementById('t-invert').checked = true;

  // Reset mouse
  mouseRaw.x = 0.5;
  mouseRaw.y = 0.5;
});

// -- Boot ---------------------------------------------------------
requestAnimationFrame(frame);
</script>
</body>
</html>
