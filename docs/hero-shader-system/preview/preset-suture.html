<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Hero Preset — Suture Fluid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;color:#ccc;overflow:hidden;display:flex}
#canvas-wrap{flex:1;position:relative;min-width:0;height:100vh}
canvas{width:100%;height:100%;display:block;cursor:crosshair}
.hud{position:absolute;top:12px;left:12px;font:11px/1.4 'SF Mono',Menlo,monospace;color:#6ee7b7;background:rgba(0,0,0,.65);padding:5px 10px;border-radius:4px;pointer-events:none;z-index:10}
.info{position:absolute;bottom:12px;left:12px;font:13px/1.6 system-ui;color:#888;background:rgba(0,0,0,.65);padding:8px 14px;border-radius:6px;max-width:380px;pointer-events:none;z-index:10}
.info strong{color:#bbb}
.panel{width:280px;min-width:280px;height:100vh;background:#111;border-left:1px solid #222;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.panel h2{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.panel h3{font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row label{font-size:12px;color:#999;width:72px;flex-shrink:0}
.color-row input[type=color]{width:36px;height:24px;border:1px solid #333;border-radius:3px;background:#1a1a1a;cursor:pointer;padding:0}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:1px}
.color-row input[type=color]::-webkit-color-swatch{border-radius:2px;border:none}
.color-hex{font:11px/1 monospace;color:#666;width:60px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.presets button{padding:5px 0;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#aaa;font:11px system-ui;cursor:pointer;transition:all .15s}
.presets button:hover{background:#222;border-color:#555}
.presets button.active{border-color:#7c3aed;background:#1e1b4b;color:#c4b5fd}
.slider-row{margin-bottom:8px}
.slider-row .label-row{display:flex;justify-content:space-between;margin-bottom:3px}
.slider-row label{font-size:12px;color:#999}
.slider-row .val{font:11px monospace;color:#666}
.slider-row input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#2a2a2a;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#7c3aed;border-radius:50%;cursor:pointer}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#7c3aed;border:none;border-radius:50%;cursor:pointer}
.btn-reset{margin-top:auto;padding:8px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#999;font:12px system-ui;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#2a2a2a;border-color:#555;color:#ccc}
.section{border-top:1px solid #1e1e1e;padding-top:12px}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="hud" id="hud">-- fps | 512x512</div>
  <div class="info">
    <strong>Suture Fluid</strong> — Reaction-diffusion advection<br>
    Hover to interact. Click for radial burst.
  </div>
</div>

<div class="panel">
  <div>
    <h2>Brand Colors</h2>
    <div class="color-row">
      <label>Primary</label>
      <input type="color" id="col-primary" value="#7c3aed">
      <span class="color-hex" id="hex-primary">#7c3aed</span>
    </div>
    <div class="color-row">
      <label>Secondary</label>
      <input type="color" id="col-secondary" value="#ec4899">
      <span class="color-hex" id="hex-secondary">#ec4899</span>
    </div>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="col-accent" value="#f59e0b">
      <span class="color-hex" id="hex-accent">#f59e0b</span>
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="col-bg" value="#0f172a">
      <span class="color-hex" id="hex-bg">#0f172a</span>
    </div>
  </div>

  <div class="section">
    <h3>Presets</h3>
    <div class="presets" id="presets"></div>
  </div>

  <div class="section">
    <h3>Simulation</h3>
    <div class="slider-row">
      <div class="label-row"><label>Curl Strength</label><span class="val" id="v-curl">30</span></div>
      <input type="range" id="s-curl" min="1" max="80" value="30" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Advection</label><span class="val" id="v-adv">6.0</span></div>
      <input type="range" id="s-adv" min="10" max="150" value="60" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Force</label><span class="val" id="v-force">1.0</span></div>
      <input type="range" id="s-force" min="10" max="300" value="100" step="1">
    </div>
  </div>

  <div class="section">
    <h3>Display</h3>
    <div class="slider-row">
      <div class="label-row"><label>Intensity</label><span class="val" id="v-intensity">0.40</span></div>
      <input type="range" id="s-intensity" min="10" max="100" value="40" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Grain</label><span class="val" id="v-grain">0.025</span></div>
      <input type="range" id="s-grain" min="0" max="80" value="25" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Vignette</label><span class="val" id="v-vignette">0.20</span></div>
      <input type="range" id="s-vignette" min="0" max="60" value="20" step="1">
    </div>
  </div>

  <button class="btn-reset" id="btn-reset">Reset Simulation</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Suture Fluid — Faithful port of XddSRX by cornusammonis
// https://www.shadertoy.com/view/XddSRX
//
// Single feedback buffer: vec3(velocity.x, velocity.y, divergence)
// Self-sustaining via curl-rotation + divergence-pressure feedback
// NO dissipation — the system is conservative, clamped to [-1,1]
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, depth: false, stencil: false });
if (!gl) { document.body.innerHTML = '<h1 style="padding:40px;color:red">WebGL2 required</h1>'; throw 0; }
const extCBF = gl.getExtension('EXT_color_buffer_float');
if (!extCBF) { document.body.innerHTML = '<h1 style="padding:40px;color:red">EXT_color_buffer_float required</h1>'; throw 0; }
gl.getExtension('OES_texture_float_linear');

const SIM_RES = 512;

const config = {
  curlStrength: 30.0,  // maps to cs: higher = more swirl
  advection: 6.0,      // advection distance (ad in original)
  force: 1.0,          // mouse force multiplier
  intensity: 0.4,      // display brightness
  grain: 0.025,
  vignette: 0.20,
  colors: {
    primary:   [0.486, 0.227, 0.929],
    secondary: [0.925, 0.282, 0.600],
    accent:    [0.961, 0.620, 0.043],
    bg:        [0.059, 0.090, 0.165],
  }
};

const PALETTES = {
  'Vibrant': { primary: '#7c3aed', secondary: '#ec4899', accent: '#f59e0b', bg: '#0f172a' },
  'Neon':    { primary: '#22d3ee', secondary: '#a3e635', accent: '#f472b6', bg: '#09090b' },
  'Ocean':   { primary: '#0284c7', secondary: '#0891b2', accent: '#34d399', bg: '#0c4a6e' },
  'Sunset':  { primary: '#e11d48', secondary: '#f97316', accent: '#fbbf24', bg: '#1c1917' },
  'Ember':   { primary: '#dc2626', secondary: '#ea580c', accent: '#fcd34d', bg: '#1c1917' },
  'Mono':    { primary: '#e5e5e5', secondary: '#a3a3a3', accent: '#525252', bg: '#0a0a0a' },
};

// ── GL helpers ───────────────────────────────────────────────
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    console.error(src.split('\n').map((l,i)=>`${i+1}: ${l}`).join('\n'));
    return null;
  }
  return s;
}
function createProgram(vSrc, fSrc) {
  const p = gl.createProgram();
  const vs = compileShader(gl.VERTEX_SHADER, vSrc);
  const fs = compileShader(gl.FRAGMENT_SHADER, fSrc);
  if (!vs || !fs) return null;
  gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); return null; }
  return p;
}
function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const VS = `#version 300 es
in vec2 a_position;
out vec2 v_uv;
void main() { v_uv = a_position * 0.5 + 0.5; gl_Position = vec4(a_position, 0, 1); }`;

// ══════════════════════════════════════════════════════════════
// INIT — IQ's simplex noise (same as original)
// ══════════════════════════════════════════════════════════════
const initProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;
uniform float uSeed;

vec2 hash(vec2 p) {
  p = vec2(dot(p, vec2(127.1,311.7)), dot(p, vec2(269.5,183.3)));
  return -1.0 + 2.0 * fract(sin(p) * 43758.5453123);
}

float noise(vec2 p) {
  const float K1 = 0.366025404;
  const float K2 = 0.211324865;
  vec2 i = floor(p + (p.x+p.y)*K1);
  vec2 a = p - i + (i.x+i.y)*K2;
  vec2 o = step(a.yx, a.xy);
  vec2 b = a - o + K2;
  vec2 c = a - 1.0 + 2.0*K2;
  vec3 h = max(0.5 - vec3(dot(a,a), dot(b,b), dot(c,c)), 0.0);
  vec3 n = h*h*h*h * vec3(dot(a,hash(i)), dot(b,hash(i+o)), dot(c,hash(i+1.0)));
  return dot(n, vec3(70.0));
}

void main() {
  vec2 p = 16.0 * v_uv + uSeed;
  fragColor = vec4(noise(p + 1.1), noise(p + 2.2), noise(p + 3.3), 0.0);
}
`);
const initU = getUniforms(initProg, ['uSeed']);

// ══════════════════════════════════════════════════════════════
// SIMULATION — Faithful XddSRX algorithm
//
// Original constants from cornusammonis:
//   cs=-0.6, ls=0.05, ps=-0.8, ds=-0.05, dp=-0.04
//   pl=0.3, ad=6.0, pwr=1.0, amp=1.0, upd=0.8, sq2=0.6
//
// The curl strength slider scales cs (default 30 → cs = -0.6)
// ══════════════════════════════════════════════════════════════
const simProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec2 uTexel;        // 1/resolution
uniform float uCurlScale;   // cs: curl rotation scale (negative)
uniform float uAdvDist;     // ad: advection distance
uniform vec2 uMouse;        // mouse position in pixels (0..simRes)
uniform float uMouseActive;
uniform float uForce;

// Safe normalize: returns zero for zero-length vectors
vec2 normz(vec2 x) {
  return x == vec2(0.0) ? vec2(0.0) : normalize(x);
}

void main() {
  // Original algorithm constants
  const float _K0 = -20.0/6.0;  // Laplacian center
  const float _K1 = 4.0/6.0;    // Laplacian edge
  const float _K2 = 1.0/6.0;    // Laplacian corner
  const float ls = 0.05;         // Laplacian velocity scale
  const float ps = -0.8;         // Laplacian-of-divergence → pressure
  const float ds = -0.05;        // divergence feedback to velocity
  const float dp = -0.04;        // divergence update from div
  const float pl = 0.3;          // divergence smoothing (Laplacian of div)
  const float pwr = 1.0;         // curl power (linear)
  const float amp = 1.0;         // self-amplification
  const float upd = 0.8;         // blend: 80% old, 20% new
  const float sq2 = 0.6;         // diagonal weight

  vec2 tx = uTexel;

  // Offsets
  vec2 n  = vec2(0, tx.y);
  vec2 ne = vec2(tx.x, tx.y);
  vec2 e  = vec2(tx.x, 0);
  vec2 se = vec2(tx.x, -tx.y);
  vec2 s  = vec2(0, -tx.y);
  vec2 sw = vec2(-tx.x, -tx.y);
  vec2 w  = vec2(-tx.x, 0);
  vec2 nw = vec2(-tx.x, tx.y);

  // Sample 3x3 neighborhood
  vec3 uv    = texture(uState, v_uv).xyz;
  vec3 uv_n  = texture(uState, v_uv + n).xyz;
  vec3 uv_e  = texture(uState, v_uv + e).xyz;
  vec3 uv_s  = texture(uState, v_uv + s).xyz;
  vec3 uv_w  = texture(uState, v_uv + w).xyz;
  vec3 uv_nw = texture(uState, v_uv + nw).xyz;
  vec3 uv_sw = texture(uState, v_uv + sw).xyz;
  vec3 uv_ne = texture(uState, v_uv + ne).xyz;
  vec3 uv_se = texture(uState, v_uv + se).xyz;

  // Laplacian (9-point isotropic stencil)
  vec3 lapl = _K0*uv + _K1*(uv_n + uv_e + uv_w + uv_s) + _K2*(uv_nw + uv_sw + uv_ne + uv_se);
  float sp = ps * lapl.z;  // pressure from Laplacian of divergence

  // Curl (with diagonal contributions, weight sq2=0.6)
  float curl = uv_n.x - uv_s.x - uv_e.y + uv_w.y
    + sq2 * (uv_nw.x + uv_nw.y + uv_ne.x - uv_ne.y
           + uv_sw.y - uv_sw.x - uv_se.y - uv_se.x);

  // Rotation angle from curl
  float sc = uCurlScale * sign(curl) * pow(abs(curl), pwr);

  // Divergence (with diagonal contributions)
  float div = uv_s.y - uv_n.y - uv_e.x + uv_w.x
    + sq2 * (uv_nw.x - uv_nw.y - uv_ne.x - uv_ne.y
           + uv_sw.x + uv_sw.y + uv_se.y - uv_se.x);

  // Update divergence channel
  float sd = uv.z + dp * div + pl * lapl.z;

  // Normalized velocity direction
  vec2 norm = normz(uv.xy);

  // Reverse advection with Gaussian blur
  vec2 aUv = v_uv - uv.xy * uAdvDist * tx;
  const float _G0 = 0.25;
  const float _G1 = 0.125;
  const float _G2 = 0.0625;
  vec3 ab = _G0 * texture(uState, aUv).xyz
          + _G1 * (texture(uState, aUv + n).xyz + texture(uState, aUv + e).xyz
                 + texture(uState, aUv + s).xyz + texture(uState, aUv + w).xyz)
          + _G2 * (texture(uState, aUv + nw).xyz + texture(uState, aUv + ne).xyz
                 + texture(uState, aUv + sw).xyz + texture(uState, aUv + se).xyz);

  // Velocity update: advected + Laplacian viscosity + pressure + div feedback
  float ta = amp * ab.x + ls * lapl.x + norm.x * sp + uv.x * ds * sd;
  float tb = amp * ab.y + ls * lapl.y + norm.y * sp + uv.y * ds * sd;

  // Rotate by curl
  float a = ta * cos(sc) - tb * sin(sc);
  float b = ta * sin(sc) + tb * cos(sc);

  // Blend: 80% old state, 20% new (conservative update)
  vec3 abd = upd * uv + (1.0 - upd) * vec3(a, b, sd);

  // Mouse force: Gaussian falloff in pixel space
  if (uMouseActive > 0.5) {
    vec2 pixelPos = v_uv / tx;  // current pixel position
    vec2 d = pixelPos - uMouse;
    float m = exp(-length(d) / (10.0 * uForce));
    abd.xy += m * normz(d);
  }

  // Clamp for stability (critical!)
  abd.z = clamp(abd.z, -1.0, 1.0);
  abd.xy = clamp(length(abd.xy) > 1.0 ? normz(abd.xy) : abd.xy, -1.0, 1.0);

  fragColor = vec4(abd, 0.0);
}
`);
const simU = getUniforms(simProg, [
  'uState', 'uTexel', 'uCurlScale', 'uAdvDist',
  'uMouse', 'uMouseActive', 'uForce'
]);

// ══════════════════════════════════════════════════════════════
// DISPLAY — Branded colorization of the velocity/divergence field
//
// Original uses: cross(normalize(state), vec3(0.5,-0.4,0.5))
// We extend this with brand palette mapping for hero section use.
// ══════════════════════════════════════════════════════════════
const displayProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec3 uColorA, uColorB, uColorC, uBgColor;
uniform float uIntensity, uGrain, uVignette, uTime;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1,311.7))) * 43758.5453); }

void main() {
  vec3 c = texture(uState, v_uv).xyz;
  float mag = length(c.xy);

  // Original XddSRX colorization as base
  vec3 norm = mag > 0.001 ? c / max(length(c), 0.001) : vec3(0.0);
  vec3 origColor = 0.5 + 0.6 * cross(norm, vec3(0.5, -0.4, 0.5));
  origColor += 0.1 * norm.z;  // divergence tint

  // Velocity direction → palette position [0,1]
  float angle = atan(c.y, c.x);
  float t = fract(angle / 6.2831853 + 0.5);

  // Smooth 3-color palette
  float t3 = t * 3.0;
  vec3 palColor;
  if (t3 < 1.0) palColor = mix(uColorA, uColorB, smoothstep(0.0, 1.0, t3));
  else if (t3 < 2.0) palColor = mix(uColorB, uColorC, smoothstep(0.0, 1.0, t3 - 1.0));
  else palColor = mix(uColorC, uColorA, smoothstep(0.0, 1.0, t3 - 2.0));

  // Blend branded palette with original cross-product coloring
  // The cross-product gives organic color variation; palette gives brand identity
  vec3 fluidColor = mix(origColor * palColor, palColor * origColor.r, 0.5);

  // Magnitude-based brightness with sensitivity for subtle motion
  float brightness = smoothstep(0.0, 0.3, mag) * 0.6 + smoothstep(0.3, 0.8, mag) * 0.2;

  // Divergence creates suture line highlights
  float divEffect = abs(c.z);
  brightness += smoothstep(0.1, 0.5, divEffect) * 0.15;
  brightness = min(brightness, 0.7);

  // Compose: background + fluid at controlled intensity
  vec3 color = uBgColor + fluidColor * brightness * uIntensity;

  // Tone mapping
  color = color / (1.0 + color);

  // Vignette
  vec2 vc = v_uv * 2.0 - 1.0;
  color *= clamp(1.0 - dot(vc, vc) * uVignette, 0.0, 1.0);

  // Film grain
  color += (hash(v_uv * 512.0 + fract(uTime * 7.13)) - 0.5) * uGrain;

  // Hard brightness cap
  fragColor = vec4(clamp(color, 0.0, 0.7), 1.0);
}
`);
const displayU = getUniforms(displayProg, [
  'uState', 'uColorA', 'uColorB', 'uColorC', 'uBgColor',
  'uIntensity', 'uGrain', 'uVignette', 'uTime'
]);

// ── Quad ─────────────────────────────────────────────────────
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQuad(prog) {
  const a = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
}

// ── Double FBO ───────────────────────────────────────────────
function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex, w, h };
}
function createDoubleFBO(w, h) {
  let a = createFBO(w, h), b = createFBO(w, h);
  return { get read(){return a}, get write(){return b}, swap(){[a,b]=[b,a]} };
}

let simBuf = createDoubleFBO(SIM_RES, SIM_RES);

// ── Init ─────────────────────────────────────────────────────
let frameNum = 0;

function initSim() {
  frameNum = 0;
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(initProg);
  bindQuad(initProg);
  gl.uniform1f(initU.uSeed, Math.random() * 100.0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.read.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// ── Mouse ────────────────────────────────────────────────────
let mouse = { x: 0, y: 0, active: false };

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  // Convert to sim-pixel coordinates (0..SIM_RES)
  mouse.x = ((e.clientX - rect.left) / rect.width) * SIM_RES;
  mouse.y = (1.0 - (e.clientY - rect.top) / rect.height) * SIM_RES;
  mouse.active = true;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('mouseenter', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * SIM_RES;
  mouse.y = (1.0 - (e.clientY - rect.top) / rect.height) * SIM_RES;
  mouse.active = true;
});

// Click burst: inject multiple forces in a ring
let clickBursts = [];
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const px = ((e.clientX - rect.left) / rect.width) * SIM_RES;
  const py = (1.0 - (e.clientY - rect.top) / rect.height) * SIM_RES;
  clickBursts.push({ x: px, y: py, frame: 0 });
});

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((t.clientX - rect.left) / rect.width) * SIM_RES;
  mouse.y = (1.0 - (t.clientY - rect.top) / rect.height) * SIM_RES;
  mouse.active = true;
  clickBursts.push({ x: mouse.x, y: mouse.y, frame: 0 });
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouse.x = ((t.clientX - rect.left) / rect.width) * SIM_RES;
  mouse.y = (1.0 - (t.clientY - rect.top) / rect.height) * SIM_RES;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// ── Resize ───────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
}
window.addEventListener('resize', resize);
resize();

// ── Sim step ─────────────────────────────────────────────────
function stepSim(mouseX, mouseY, mouseOn) {
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(simProg);
  bindQuad(simProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(simU.uState, 0);

  const tx = 1.0 / SIM_RES;
  gl.uniform2f(simU.uTexel, tx, tx);

  // Map curlStrength slider (1-80, default 30) to cs
  // Original cs = -0.6. At slider=30, cs=-0.6. Scale linearly.
  gl.uniform1f(simU.uCurlScale, -config.curlStrength / 50.0);
  gl.uniform1f(simU.uAdvDist, config.advection);
  gl.uniform2f(simU.uMouse, mouseX, mouseY);
  gl.uniform1f(simU.uMouseActive, mouseOn ? 1.0 : 0.0);
  gl.uniform1f(simU.uForce, config.force);

  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  simBuf.swap();
}

// ── Display ──────────────────────────────────────────────────
function display(time) {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(displayProg);
  bindQuad(displayProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(displayU.uState, 0);

  const c = config.colors;
  gl.uniform3fv(displayU.uColorA, c.primary);
  gl.uniform3fv(displayU.uColorB, c.secondary);
  gl.uniform3fv(displayU.uColorC, c.accent);
  gl.uniform3fv(displayU.uBgColor, c.bg);
  gl.uniform1f(displayU.uIntensity, config.intensity);
  gl.uniform1f(displayU.uGrain, config.grain);
  gl.uniform1f(displayU.uVignette, config.vignette);
  gl.uniform1f(displayU.uTime, time * 0.001);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── Main loop ────────────────────────────────────────────────
let fpsCount = 0, fpsTime = 0, fpsVal = 0;
let lastAmbient = 0;

function frame(time) {
  requestAnimationFrame(frame);
  frameNum++;

  // FPS
  fpsCount++;
  if (time - fpsTime > 1000) {
    fpsVal = Math.round(fpsCount * 1000 / (time - fpsTime));
    fpsTime = time; fpsCount = 0;
    document.getElementById('hud').textContent = `${fpsVal} fps | ${SIM_RES}x${SIM_RES}`;
  }

  // Re-init for first 10 frames (matches original)
  if (frameNum <= 10) {
    gl.viewport(0, 0, SIM_RES, SIM_RES);
    gl.useProgram(initProg);
    bindQuad(initProg);
    gl.uniform1f(initU.uSeed, Math.random() * 100.0 + frameNum);
    gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    gl.bindFramebuffer(gl.FRAMEBUFFER, null);
    simBuf.swap();
    display(time);
    return;
  }

  // Ambient splats: gentle random force every 3-4s
  if (time - lastAmbient > 3500) {
    lastAmbient = time;
    const ax = (0.15 + Math.random() * 0.7) * SIM_RES;
    const ay = (0.15 + Math.random() * 0.7) * SIM_RES;
    stepSim(ax, ay, true);
  }

  // Click bursts: 8 radial force injections
  for (let i = clickBursts.length - 1; i >= 0; i--) {
    const b = clickBursts[i];
    if (b.frame < 8) {
      const angle = (b.frame / 8) * Math.PI * 2;
      const r = 20; // 20 pixels radius
      const bx = b.x + Math.cos(angle) * r;
      const by = b.y + Math.sin(angle) * r;
      const prevForce = config.force;
      config.force *= 2.0;
      stepSim(bx, by, true);
      config.force = prevForce;
      b.frame++;
    } else {
      clickBursts.splice(i, 1);
    }
  }

  // Normal sim step
  stepSim(
    mouse.active ? mouse.x : -1000,
    mouse.active ? mouse.y : -1000,
    mouse.active
  );

  display(time);
}

// ── UI ───────────────────────────────────────────────────────
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}

['primary','secondary','accent','bg'].forEach(key => {
  const inp = document.getElementById(`col-${key}`);
  const hex = document.getElementById(`hex-${key}`);
  inp.addEventListener('input', () => {
    config.colors[key] = hexToRgb(inp.value);
    hex.textContent = inp.value;
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  });
});

const presetsEl = document.getElementById('presets');
Object.entries(PALETTES).forEach(([name, pal]) => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    config.colors.primary = hexToRgb(pal.primary);
    config.colors.secondary = hexToRgb(pal.secondary);
    config.colors.accent = hexToRgb(pal.accent);
    config.colors.bg = hexToRgb(pal.bg);
    ['primary','secondary','accent','bg'].forEach(k => {
      document.getElementById(`col-${k}`).value = pal[k];
      document.getElementById(`hex-${k}`).textContent = pal[k];
    });
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  if (name === 'Vibrant') btn.classList.add('active');
  presetsEl.appendChild(btn);
});

function wireSlider(id, key, xform, fmt) {
  const s = document.getElementById(`s-${id}`);
  const d = document.getElementById(`v-${id}`);
  s.addEventListener('input', () => { const v = xform(+s.value); config[key] = v; d.textContent = fmt(v); });
}
wireSlider('curl',      'curlStrength', v=>v,       v=>v.toFixed(0));
wireSlider('adv',       'advection',    v=>v/10,    v=>v.toFixed(1));
wireSlider('force',     'force',        v=>v/100,   v=>v.toFixed(1));
wireSlider('intensity', 'intensity',    v=>v/100,   v=>v.toFixed(2));
wireSlider('grain',     'grain',        v=>v/1000,  v=>v.toFixed(3));
wireSlider('vignette',  'vignette',     v=>v/100,   v=>v.toFixed(2));

document.getElementById('btn-reset').addEventListener('click', initSim);

// ── Boot ─────────────────────────────────────────────────────
initSim();
requestAnimationFrame(frame);
</script>
</body>
</html>
