<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Codex Hero Preset — Water Ripple</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;width:100%}
body{background:#0a0a0a;font-family:system-ui,-apple-system,sans-serif;color:#ccc;overflow:hidden;display:flex}
#canvas-wrap{flex:1;position:relative;min-width:0;height:100vh}
canvas{width:100%;height:100%;display:block;cursor:crosshair}
.hud{position:absolute;top:12px;left:12px;font:11px/1.4 'SF Mono',Menlo,monospace;color:#6ee7b7;background:rgba(0,0,0,.65);padding:5px 10px;border-radius:4px;pointer-events:none;z-index:10}
.info{position:absolute;bottom:12px;left:12px;font:13px/1.6 system-ui;color:#888;background:rgba(0,0,0,.65);padding:8px 14px;border-radius:6px;max-width:380px;pointer-events:none;z-index:10}
.info strong{color:#bbb}
.panel{width:280px;min-width:280px;height:100vh;background:#111;border-left:1px solid #222;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:16px}
.panel h2{font-size:13px;font-weight:600;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.panel h3{font-size:11px;font-weight:600;color:#777;text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px}
.color-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.color-row label{font-size:12px;color:#999;width:72px;flex-shrink:0}
.color-row input[type=color]{width:36px;height:24px;border:1px solid #333;border-radius:3px;background:#1a1a1a;cursor:pointer;padding:0}
.color-row input[type=color]::-webkit-color-swatch-wrapper{padding:1px}
.color-row input[type=color]::-webkit-color-swatch{border-radius:2px;border:none}
.color-hex{font:11px/1 monospace;color:#666;width:60px}
.presets{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.presets button{padding:5px 0;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#aaa;font:11px system-ui;cursor:pointer;transition:all .15s}
.presets button:hover{background:#222;border-color:#555}
.presets button.active{border-color:#7c3aed;background:#1e1b4b;color:#c4b5fd}
.slider-row{margin-bottom:8px}
.slider-row .label-row{display:flex;justify-content:space-between;margin-bottom:3px}
.slider-row label{font-size:12px;color:#999}
.slider-row .val{font:11px monospace;color:#666}
.slider-row input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:#2a2a2a;border-radius:2px;outline:none}
.slider-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#7c3aed;border-radius:50%;cursor:pointer}
.slider-row input[type=range]::-moz-range-thumb{width:14px;height:14px;background:#7c3aed;border:none;border-radius:50%;cursor:pointer}
.btn-reset{margin-top:auto;padding:8px;background:#1a1a1a;border:1px solid #333;border-radius:4px;color:#999;font:12px system-ui;cursor:pointer;transition:all .15s}
.btn-reset:hover{background:#2a2a2a;border-color:#555;color:#ccc}
.section{border-top:1px solid #1e1e1e;padding-top:12px}
</style>
</head>
<body>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div class="hud" id="hud">-- fps | 512x512</div>
  <div class="info">
    <strong>Water Ripple</strong> — 2D wave equation with refraction<br>
    Hover to ripple. Click for splash.
  </div>
</div>

<div class="panel">
  <div>
    <h2>Brand Colors</h2>
    <div class="color-row">
      <label>Primary</label>
      <input type="color" id="col-primary" value="#7c3aed">
      <span class="color-hex" id="hex-primary">#7c3aed</span>
    </div>
    <div class="color-row">
      <label>Secondary</label>
      <input type="color" id="col-secondary" value="#ec4899">
      <span class="color-hex" id="hex-secondary">#ec4899</span>
    </div>
    <div class="color-row">
      <label>Accent</label>
      <input type="color" id="col-accent" value="#f59e0b">
      <span class="color-hex" id="hex-accent">#f59e0b</span>
    </div>
    <div class="color-row">
      <label>Background</label>
      <input type="color" id="col-bg" value="#0f172a">
      <span class="color-hex" id="hex-bg">#0f172a</span>
    </div>
  </div>

  <div class="section">
    <h3>Presets</h3>
    <div class="presets" id="presets"></div>
  </div>

  <div class="section">
    <h3>Wave Physics</h3>
    <div class="slider-row">
      <div class="label-row"><label>Wave Speed</label><span class="val" id="v-speed">0.80</span></div>
      <input type="range" id="s-speed" min="10" max="200" value="80" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Damping</label><span class="val" id="v-damping">0.995</span></div>
      <input type="range" id="s-damping" min="980" max="999" value="995" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Ripple Size</label><span class="val" id="v-ripple">0.030</span></div>
      <input type="range" id="s-ripple" min="10" max="100" value="30" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Refraction</label><span class="val" id="v-refraction">0.50</span></div>
      <input type="range" id="s-refraction" min="10" max="100" value="50" step="1">
    </div>
  </div>

  <div class="section">
    <h3>Display</h3>
    <div class="slider-row">
      <div class="label-row"><label>Intensity</label><span class="val" id="v-intensity">0.40</span></div>
      <input type="range" id="s-intensity" min="10" max="100" value="40" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Grain</label><span class="val" id="v-grain">0.025</span></div>
      <input type="range" id="s-grain" min="0" max="80" value="25" step="1">
    </div>
    <div class="slider-row">
      <div class="label-row"><label>Vignette</label><span class="val" id="v-vignette">0.20</span></div>
      <input type="range" id="s-vignette" min="0" max="60" value="20" step="1">
    </div>
  </div>

  <button class="btn-reset" id="btn-reset">Reset Simulation</button>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// Water Ripple — 2D wave equation with ping-pong FBO
// Inspired by Shadertoy Mt33DH
//
// Pass 1: Wave simulation (512x512 ping-pong)
//   vec4(height, previousHeight, 0, 0)
//   2D wave equation with damping + mouse impulse
//
// Pass 2: Display
//   Normal-mapped surface with refraction, Fresnel, caustics
// ═══════════════════════════════════════════════════════════════

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl2', { alpha: false, antialias: false, depth: false, stencil: false });
if (!gl) { document.body.innerHTML = '<h1 style="padding:40px;color:red">WebGL2 required</h1>'; throw 0; }
const extCBF = gl.getExtension('EXT_color_buffer_float');
if (!extCBF) { document.body.innerHTML = '<h1 style="padding:40px;color:red">EXT_color_buffer_float required</h1>'; throw 0; }
gl.getExtension('OES_texture_float_linear');

const SIM_RES = 512;

const config = {
  waveSpeed: 0.8,
  damping: 0.995,
  rippleSize: 0.03,
  refraction: 0.5,
  intensity: 0.4,
  grain: 0.025,
  vignette: 0.20,
  colors: {
    primary:   [0.486, 0.227, 0.929],
    secondary: [0.925, 0.282, 0.600],
    accent:    [0.961, 0.620, 0.043],
    bg:        [0.059, 0.090, 0.165],
  }
};

const PALETTES = {
  'Vibrant': { primary: '#7c3aed', secondary: '#ec4899', accent: '#f59e0b', bg: '#0f172a' },
  'Neon':    { primary: '#22d3ee', secondary: '#a3e635', accent: '#f472b6', bg: '#09090b' },
  'Ocean':   { primary: '#0284c7', secondary: '#0891b2', accent: '#34d399', bg: '#0c4a6e' },
  'Sunset':  { primary: '#e11d48', secondary: '#f97316', accent: '#fbbf24', bg: '#1c1917' },
  'Ember':   { primary: '#dc2626', secondary: '#ea580c', accent: '#fcd34d', bg: '#1c1917' },
  'Mono':    { primary: '#e5e5e5', secondary: '#a3a3a3', accent: '#525252', bg: '#0a0a0a' },
};

// ── GL helpers ───────────────────────────────────────────────
function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error('Shader error:', gl.getShaderInfoLog(s));
    console.error(src.split('\n').map((l,i)=>`${i+1}: ${l}`).join('\n'));
    return null;
  }
  return s;
}
function createProgram(vSrc, fSrc) {
  const p = gl.createProgram();
  const vs = compileShader(gl.VERTEX_SHADER, vSrc);
  const fs = compileShader(gl.FRAGMENT_SHADER, fSrc);
  if (!vs || !fs) return null;
  gl.attachShader(p, vs); gl.attachShader(p, fs); gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) { console.error(gl.getProgramInfoLog(p)); return null; }
  return p;
}
function getUniforms(prog, names) {
  const u = {};
  for (const n of names) u[n] = gl.getUniformLocation(prog, n);
  return u;
}

const VS = `#version 300 es
in vec2 a_position;
out vec2 v_uv;
void main() { v_uv = a_position * 0.5 + 0.5; gl_Position = vec4(a_position, 0, 1); }`;

// ══════════════════════════════════════════════════════════════
// INIT — Flat water (all zeros)
// ══════════════════════════════════════════════════════════════
const initProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;
void main() {
  fragColor = vec4(0.0);
}
`);

// ══════════════════════════════════════════════════════════════
// PASS 1: WAVE SIMULATION
//
// vec4(height, previousHeight, 0, 0)
// 2D wave equation: next = 2*current - previous + c^2 * laplacian
// Damping applied each frame
// Mouse deposits Gaussian impulse
// ══════════════════════════════════════════════════════════════
const simProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec2 uTexel;
uniform float uWaveSpeed;
uniform float uDamping;
uniform float uRippleSize;
uniform vec2 uMouse;          // normalized 0..1
uniform float uMouseActive;
uniform float uMouseStrength;  // 1.0 for hover, larger for click

void main() {
  // Sample center and 4 neighbors
  vec4 center = texture(uState, v_uv);
  float hN = texture(uState, v_uv + vec2(0.0, uTexel.y)).x;
  float hS = texture(uState, v_uv - vec2(0.0, uTexel.y)).x;
  float hE = texture(uState, v_uv + vec2(uTexel.x, 0.0)).x;
  float hW = texture(uState, v_uv - vec2(uTexel.x, 0.0)).x;

  float current = center.x;
  float previous = center.y;

  // Laplacian (4-point stencil)
  float laplacian = hN + hS + hE + hW - 4.0 * current;

  // 2D wave equation
  float c2 = uWaveSpeed * uWaveSpeed * 0.25;  // scaled for stability
  float next = 2.0 * current - previous + c2 * laplacian;

  // Damping
  next *= uDamping;

  // Mouse impulse: Gaussian deposit
  if (uMouseActive > 0.5) {
    vec2 d = v_uv - uMouse;
    float r = uRippleSize;
    float impulse = uMouseStrength * 0.015 * exp(-dot(d, d) / (r * r));
    next += impulse;
  }

  // Clamp for stability
  next = clamp(next, -2.0, 2.0);

  // Edge reflection: dampen near boundaries
  vec2 edge = smoothstep(vec2(0.0), vec2(uTexel * 4.0), v_uv) *
              smoothstep(vec2(0.0), vec2(uTexel * 4.0), 1.0 - v_uv);
  next *= edge.x * edge.y;

  // Store: (nextHeight, currentHeight, 0, 0)
  fragColor = vec4(next, current, 0.0, 0.0);
}
`);
const simU = getUniforms(simProg, [
  'uState', 'uTexel', 'uWaveSpeed', 'uDamping', 'uRippleSize',
  'uMouse', 'uMouseActive', 'uMouseStrength'
]);

// ══════════════════════════════════════════════════════════════
// PASS 2: DISPLAY
//
// Compute normals from height gradient
// Refract through surface, sample brand gradient
// Fresnel reflection, caustic highlights, specular
// ══════════════════════════════════════════════════════════════
const displayProg = createProgram(VS, `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 fragColor;

uniform sampler2D uState;
uniform vec2 uTexel;
uniform vec3 uColorPrimary, uColorSecondary, uColorAccent, uBgColor;
uniform float uIntensity, uRefraction, uGrain, uVignette, uTime;

float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }

// Smooth brand color gradient based on UV position
vec3 brandGradient(vec2 uv) {
  // Diagonal gradient through brand colors
  float t = (uv.x + uv.y) * 0.5;
  float t3 = t * 3.0;
  vec3 col;
  if (t3 < 1.0) col = mix(uColorPrimary, uColorSecondary, smoothstep(0.0, 1.0, t3));
  else if (t3 < 2.0) col = mix(uColorSecondary, uColorAccent, smoothstep(0.0, 1.0, t3 - 1.0));
  else col = mix(uColorAccent, uColorPrimary, smoothstep(0.0, 1.0, t3 - 2.0));
  return col;
}

void main() {
  // Read wave height field
  float hC = texture(uState, v_uv).x;
  float hN = texture(uState, v_uv + vec2(0.0, uTexel.y)).x;
  float hS = texture(uState, v_uv - vec2(0.0, uTexel.y)).x;
  float hE = texture(uState, v_uv + vec2(uTexel.x, 0.0)).x;
  float hW = texture(uState, v_uv - vec2(uTexel.x, 0.0)).x;

  // Compute surface normal from height gradient (finite differences)
  float dhdx = (hE - hW) * 0.5;
  float dhdy = (hN - hS) * 0.5;
  vec3 normal = normalize(vec3(-dhdx * 8.0, 1.0, -dhdy * 8.0));

  // View direction (looking down at water surface)
  vec3 viewDir = vec3(0.0, 1.0, 0.0);

  // Refracted UV offset
  vec2 refractedUV = v_uv + normal.xz * uRefraction * 0.08;
  refractedUV = clamp(refractedUV, 0.0, 1.0);

  // Sample brand color at refracted position
  vec3 refractedColor = brandGradient(refractedUV);

  // Deep water base: darken background for depth
  vec3 deepColor = uBgColor * 0.6;

  // Fresnel effect (Schlick approximation)
  float cosTheta = max(dot(normal, viewDir), 0.0);
  float fresnel = pow(1.0 - cosTheta, 3.0) * 0.6;

  // Reflection color: lighter brand color mix
  vec3 reflectColor = mix(uColorPrimary, uColorSecondary, 0.5) * 0.4 + 0.1;

  // Combine refraction and reflection via Fresnel
  vec3 surfaceColor = mix(refractedColor, reflectColor, fresnel);

  // Caustic highlights: where wave height gradient is steep (constructive interference)
  float gradientMag = length(vec2(dhdx, dhdy));
  float caustic = smoothstep(0.02, 0.15, gradientMag) * 0.35;
  vec3 causticColor = uColorAccent * caustic;

  // Specular highlight from directional light
  vec3 lightDir = normalize(vec3(0.3, 1.0, 0.2));
  vec3 halfVec = normalize(lightDir + viewDir);
  float spec = pow(max(dot(normal, halfVec), 0.0), 64.0);
  vec3 specColor = vec3(1.0) * spec * 0.3;

  // Wave height contribution: brighter on crests, darker in troughs
  float heightBright = hC * 0.15;

  // Compose final color
  vec3 waterColor = deepColor + surfaceColor * uIntensity * 0.8;
  waterColor += causticColor * uIntensity;
  waterColor += specColor * uIntensity;
  waterColor += heightBright * uColorPrimary * uIntensity * 0.5;

  // Tone mapping (Reinhard)
  waterColor = waterColor / (1.0 + waterColor);

  // Vignette
  vec2 vc = v_uv * 2.0 - 1.0;
  waterColor *= clamp(1.0 - dot(vc, vc) * uVignette, 0.0, 1.0);

  // Film grain
  waterColor += (hash(v_uv * 512.0 + fract(uTime * 7.13)) - 0.5) * uGrain;

  // Brightness cap for subtlety
  fragColor = vec4(clamp(waterColor, 0.0, 0.75), 1.0);
}
`);
const displayU = getUniforms(displayProg, [
  'uState', 'uTexel',
  'uColorPrimary', 'uColorSecondary', 'uColorAccent', 'uBgColor',
  'uIntensity', 'uRefraction', 'uGrain', 'uVignette', 'uTime'
]);

// ── Quad ─────────────────────────────────────────────────────
const quadBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, quadBuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);

function bindQuad(prog) {
  const a = gl.getAttribLocation(prog, 'a_position');
  gl.enableVertexAttribArray(a);
  gl.vertexAttribPointer(a, 2, gl.FLOAT, false, 0, 0);
}

// ── Double FBO (ping-pong) ──────────────────────────────────
function createFBO(w, h) {
  const tex = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA16F, w, h, 0, gl.RGBA, gl.HALF_FLOAT, null);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  const fbo = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  return { fbo, tex, w, h };
}
function createDoubleFBO(w, h) {
  let a = createFBO(w, h), b = createFBO(w, h);
  return { get read(){return a}, get write(){return b}, swap(){[a,b]=[b,a]} };
}

let simBuf = createDoubleFBO(SIM_RES, SIM_RES);

// ── Init ─────────────────────────────────────────────────────
function initSim() {
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(initProg);
  bindQuad(initProg);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.read.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
}

// ── Mouse ────────────────────────────────────────────────────
let mouse = { x: 0, y: 0, active: false, strength: 1.0 };

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width;
  mouse.y = 1.0 - (e.clientY - rect.top) / rect.height;
  mouse.active = true;
  mouse.strength = 1.0;
});
canvas.addEventListener('mouseleave', () => { mouse.active = false; });
canvas.addEventListener('mouseenter', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - rect.left) / rect.width;
  mouse.y = 1.0 - (e.clientY - rect.top) / rect.height;
  mouse.active = true;
  mouse.strength = 1.0;
});

// Click creates a larger splash
let clickSplashes = [];
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const px = (e.clientX - rect.left) / rect.width;
  const py = 1.0 - (e.clientY - rect.top) / rect.height;
  clickSplashes.push({ x: px, y: py, frames: 0 });
});

// Touch support
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouse.x = (t.clientX - rect.left) / rect.width;
  mouse.y = 1.0 - (t.clientY - rect.top) / rect.height;
  mouse.active = true;
  mouse.strength = 1.0;
  clickSplashes.push({ x: mouse.x, y: mouse.y, frames: 0 });
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouse.x = (t.clientX - rect.left) / rect.width;
  mouse.y = 1.0 - (t.clientY - rect.top) / rect.height;
  mouse.active = true;
}, { passive: false });
canvas.addEventListener('touchend', () => { mouse.active = false; });

// ── Resize ───────────────────────────────────────────────────
function resize() {
  const wrap = document.getElementById('canvas-wrap');
  const dpr = Math.min(window.devicePixelRatio, 2);
  canvas.width = wrap.clientWidth * dpr;
  canvas.height = wrap.clientHeight * dpr;
}
window.addEventListener('resize', resize);
resize();

// ── Sim step ─────────────────────────────────────────────────
function stepSim(mouseX, mouseY, mouseOn, mouseStr) {
  gl.viewport(0, 0, SIM_RES, SIM_RES);
  gl.useProgram(simProg);
  bindQuad(simProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(simU.uState, 0);

  const tx = 1.0 / SIM_RES;
  gl.uniform2f(simU.uTexel, tx, tx);
  gl.uniform1f(simU.uWaveSpeed, config.waveSpeed);
  gl.uniform1f(simU.uDamping, config.damping);
  gl.uniform1f(simU.uRippleSize, config.rippleSize);
  gl.uniform2f(simU.uMouse, mouseX, mouseY);
  gl.uniform1f(simU.uMouseActive, mouseOn ? 1.0 : 0.0);
  gl.uniform1f(simU.uMouseStrength, mouseStr);

  gl.bindFramebuffer(gl.FRAMEBUFFER, simBuf.write.fbo);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  simBuf.swap();
}

// ── Display ──────────────────────────────────────────────────
function display(time) {
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.useProgram(displayProg);
  bindQuad(displayProg);

  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, simBuf.read.tex);
  gl.uniform1i(displayU.uState, 0);

  const tx = 1.0 / SIM_RES;
  gl.uniform2f(displayU.uTexel, tx, tx);

  const c = config.colors;
  gl.uniform3fv(displayU.uColorPrimary, c.primary);
  gl.uniform3fv(displayU.uColorSecondary, c.secondary);
  gl.uniform3fv(displayU.uColorAccent, c.accent);
  gl.uniform3fv(displayU.uBgColor, c.bg);
  gl.uniform1f(displayU.uIntensity, config.intensity);
  gl.uniform1f(displayU.uRefraction, config.refraction);
  gl.uniform1f(displayU.uGrain, config.grain);
  gl.uniform1f(displayU.uVignette, config.vignette);
  gl.uniform1f(displayU.uTime, time * 0.001);

  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ── Main loop ────────────────────────────────────────────────
let fpsCount = 0, fpsTime = 0, fpsVal = 0;
let lastAmbient = 0;

function frame(time) {
  requestAnimationFrame(frame);

  // FPS counter
  fpsCount++;
  if (time - fpsTime > 1000) {
    fpsVal = Math.round(fpsCount * 1000 / (time - fpsTime));
    fpsTime = time; fpsCount = 0;
    document.getElementById('hud').textContent = `${fpsVal} fps | ${SIM_RES}x${SIM_RES}`;
  }

  // Ambient drips: gentle random ripples every 2-3 seconds for life
  if (time - lastAmbient > 2500 + Math.random() * 1500) {
    lastAmbient = time;
    const ax = 0.15 + Math.random() * 0.7;
    const ay = 0.15 + Math.random() * 0.7;
    stepSim(ax, ay, true, 0.6);
  }

  // Process click splashes: inject over several frames for a spreading ring
  for (let i = clickSplashes.length - 1; i >= 0; i--) {
    const sp = clickSplashes[i];
    if (sp.frames < 6) {
      // Deposit at center with decreasing strength
      const str = 3.0 * (1.0 - sp.frames / 6.0);
      stepSim(sp.x, sp.y, true, str);
      sp.frames++;
    } else {
      clickSplashes.splice(i, 1);
    }
  }

  // Normal sim step with hover
  stepSim(
    mouse.active ? mouse.x : -10.0,
    mouse.active ? mouse.y : -10.0,
    mouse.active,
    mouse.strength
  );

  // Run a couple of extra sim substeps for smoother wave propagation
  stepSim(-10.0, -10.0, false, 0.0);

  display(time);
}

// ── UI ───────────────────────────────────────────────────────
function hexToRgb(h) {
  return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];
}

['primary','secondary','accent','bg'].forEach(key => {
  const inp = document.getElementById(`col-${key}`);
  const hex = document.getElementById(`hex-${key}`);
  inp.addEventListener('input', () => {
    config.colors[key] = hexToRgb(inp.value);
    hex.textContent = inp.value;
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
  });
});

const presetsEl = document.getElementById('presets');
Object.entries(PALETTES).forEach(([name, pal]) => {
  const btn = document.createElement('button');
  btn.textContent = name;
  btn.addEventListener('click', () => {
    config.colors.primary = hexToRgb(pal.primary);
    config.colors.secondary = hexToRgb(pal.secondary);
    config.colors.accent = hexToRgb(pal.accent);
    config.colors.bg = hexToRgb(pal.bg);
    ['primary','secondary','accent','bg'].forEach(k => {
      document.getElementById(`col-${k}`).value = pal[k];
      document.getElementById(`hex-${k}`).textContent = pal[k];
    });
    document.querySelectorAll('.presets button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
  if (name === 'Vibrant') btn.classList.add('active');
  presetsEl.appendChild(btn);
});

function wireSlider(id, key, xform, fmt) {
  const s = document.getElementById(`s-${id}`);
  const d = document.getElementById(`v-${id}`);
  s.addEventListener('input', () => { const v = xform(+s.value); config[key] = v; d.textContent = fmt(v); });
}
wireSlider('speed',      'waveSpeed',   v=>v/100,   v=>v.toFixed(2));
wireSlider('damping',    'damping',     v=>v/1000,  v=>v.toFixed(3));
wireSlider('ripple',     'rippleSize',  v=>v/1000,  v=>v.toFixed(3));
wireSlider('refraction', 'refraction',  v=>v/100,   v=>v.toFixed(2));
wireSlider('intensity',  'intensity',   v=>v/100,   v=>v.toFixed(2));
wireSlider('grain',      'grain',       v=>v/1000,  v=>v.toFixed(3));
wireSlider('vignette',   'vignette',    v=>v/100,   v=>v.toFixed(2));

document.getElementById('btn-reset').addEventListener('click', initSim);

// ── Boot ─────────────────────────────────────────────────────
initSim();
requestAnimationFrame(frame);
</script>
