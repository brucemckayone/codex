  body { background: #0d0906; }
  /* top bar: transparent over hero, condenses on scroll (review scaffold) */
  .switch { transition: background .4s var(--ease), border-color .4s; border-bottom-color: transparent; background: transparent; }
  .switch.solid { background: color-mix(in oklab, var(--ink) 82%, transparent); border-bottom-color: color-mix(in oklab, var(--ember) 16%, transparent); }
  /* persistent floating CTA */
  .floatcta {

    box-shadow: 0 20px 50px -20px #000; transition: transform .5s var(--ease); max-width: calc(100vw - 2rem);
  }
  .floatcta.show { transform: translate(-50%, 0); }
  .floatcta .fc-copy { font-size: .86rem; color: var(--bone-dim); white-space: nowrap; }
  .floatcta .fc-copy b { color: var(--bone); font-weight: 500; font-family: var(--serif); }
  .floatcta .cta { padding: .7rem 1.3rem; }
