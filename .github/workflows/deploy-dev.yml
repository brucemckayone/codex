name: Deploy to Dev

# Long-lived dev branch deploy: push to `dev` → deploys all workers + web
# to *.dev.revelations.studio. Mirrors deploy-production.yml structure but
# uses dev-scoped secrets (DEV_*) and the Neon dev branch.
#
# Before first deploy, ensure the user has:
#   - Created Neon dev branch + set DEV_DATABASE_URL secret
#   - Configured *.dev.revelations.studio wildcard DNS in Cloudflare
#   - Created R2 buckets codex-media-dev / codex-assets-dev
#   - Set DEV_* secrets per workers below

on:
  workflow_run:
    workflows: ["PR and Push CI (Neon ephemeral DB)"]
    types:
      - completed
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  issues: write

concurrency:
  group: dev-deployment
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.event == 'push' &&
       github.event.workflow_run.head_branch == 'dev')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-dev-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-dev-${{ hashFiles('pnpm-lock.yaml', 'turbo.json', '**/package.json') }}-
            ${{ runner.os }}-turbo-dev-
            ${{ runner.os }}-turbo-

      - name: Build all workers
        run: pnpm build
        env:
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          TURBO_LOG_VERBOSITY: info

      - name: Build constants package
        run: pnpm --filter @codex/constants build

      - name: Run dev database migrations
        run: pnpm --filter @codex/database db:migrate
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DB_METHOD: PRODUCTION

      # --- WORKER DEPLOYMENTS ---

      - name: Deploy media-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/media-api
          command: deploy --env dev

      - name: Upload media-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev media-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          RUNPOD_API_KEY: ${{ secrets.DEV_RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.DEV_RUNPOD_ENDPOINT_ID }}
          RUNPOD_WEBHOOK_SECRET: ${{ secrets.DEV_RUNPOD_WEBHOOK_SECRET }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}
          B2_ENDPOINT: ${{ secrets.DEV_B2_ENDPOINT }}
          B2_KEY_ID: ${{ secrets.DEV_B2_KEY_ID }}
          B2_APP_KEY: ${{ secrets.DEV_B2_APP_KEY }}
          B2_BUCKET: ${{ secrets.DEV_B2_BUCKET }}

      - name: Deploy ecom-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/ecom-api
          command: deploy --env dev

      - name: Upload ecom-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev ecom-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          # Stripe test-mode keys for dev — separate from prod live keys
          STRIPE_SECRET_KEY: ${{ secrets.DEV_STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET_PAYMENT: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_PAYMENT }}
          STRIPE_WEBHOOK_SECRET_SUBSCRIPTION: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_SUBSCRIPTION }}
          STRIPE_WEBHOOK_SECRET_CONNECT: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_CONNECT }}
          STRIPE_WEBHOOK_SECRET_CUSTOMER: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_CUSTOMER }}
          STRIPE_WEBHOOK_SECRET_BOOKING: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_BOOKING }}
          STRIPE_WEBHOOK_SECRET_DISPUTE: ${{ secrets.DEV_STRIPE_WEBHOOK_SECRET_DISPUTE }}

      - name: Deploy content-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/content-api
          command: deploy --env dev

      - name: Upload content-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev content-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}

      - name: Deploy identity-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/identity-api
          command: deploy --env dev

      - name: Upload identity-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev identity-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}

      - name: Deploy admin-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/admin-api
          command: deploy --env dev

      - name: Upload admin-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev admin-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}

      - name: Deploy organization-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/organization-api
          command: deploy --env dev

      - name: Upload organization-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev organization-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}

      - name: Deploy notifications-api
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/notifications-api
          command: deploy --env dev

      - name: Upload notifications-api secrets
        run: .github/scripts/upload-worker-secrets.sh dev notifications-api
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          RESEND_API_KEY: ${{ secrets.DEV_RESEND_API_KEY }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}

      - name: Deploy auth-worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers/auth
          command: deploy --env dev

      - name: Upload auth-worker secrets
        run: .github/scripts/upload-worker-secrets.sh dev auth
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.DEV_SESSION_SECRET }}
          BETTER_AUTH_SECRET: ${{ secrets.DEV_BETTER_AUTH_SECRET }}
          WORKER_SHARED_SECRET: ${{ secrets.DEV_WORKER_SHARED_SECRET }}

      - name: Build SvelteKit app
        run: pnpm build:web
        env:
          DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          PUBLIC_APP_URL: https://dev.revelations.studio
          TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
          TURBO_TEAM: ${{ vars.TURBO_TEAM }}
          TURBO_LOG_VERBOSITY: info

      - name: Deploy SvelteKit
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
          command: deploy --env dev

      - name: Upload web secrets
        run: |
          echo '{"DATABASE_URL":"${{ secrets.DEV_DATABASE_URL }}"}' | npx wrangler secret bulk --name codex-web-dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # --- POST-DEPLOYMENT VERIFICATION ---

      - name: Smoke tests
        timeout-minutes: 5
        run: |
          echo "🧪 Running smoke tests on dev services..." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          FAILED=0
          check_health() {
            local service_name=$1
            local url=$2
            if curl -L -f -s "$url" > /dev/null 2>&1; then
              echo "✅ $service_name" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ $service_name ($url)" >> $GITHUB_STEP_SUMMARY
              return 1
            fi
          }

          echo "⏳ Waiting 30s for propagation..."
          sleep 30

          check_health "Media API" "https://media-api.dev.revelations.studio/health" || FAILED=1
          check_health "Ecom API" "https://ecom-api.dev.revelations.studio/health" || FAILED=1
          check_health "Content API" "https://content-api.dev.revelations.studio/health" || FAILED=1
          check_health "Identity API" "https://identity-api.dev.revelations.studio/health" || FAILED=1
          check_health "Organization API" "https://organization-api.dev.revelations.studio/health" || FAILED=1
          check_health "Notifications API" "https://notifications-api.dev.revelations.studio/health" || FAILED=1
          check_health "Admin API" "https://admin-api.dev.revelations.studio/health" || FAILED=1
          check_health "Auth Worker" "https://auth.dev.revelations.studio/health" || FAILED=1
          check_health "Web App" "https://dev.revelations.studio/" || FAILED=1

          if [ $FAILED -eq 0 ]; then
            echo "✅ **All dev services passed smoke tests**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "❌ **Some dev services failed smoke tests**" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Deployment summary
        if: always()
        run: |
          echo "## 🚧 Dev Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | [dev.revelations.studio](https://dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Media API | [media-api.dev.revelations.studio](https://media-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Ecom API | [ecom-api.dev.revelations.studio](https://ecom-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Content API | [content-api.dev.revelations.studio](https://content-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Identity API | [identity-api.dev.revelations.studio](https://identity-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Organization API | [organization-api.dev.revelations.studio](https://organization-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Notifications API | [notifications-api.dev.revelations.studio](https://notifications-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Admin API | [admin-api.dev.revelations.studio](https://admin-api.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | [auth.dev.revelations.studio](https://auth.dev.revelations.studio) |" >> $GITHUB_STEP_SUMMARY
