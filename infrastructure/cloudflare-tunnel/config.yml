# Cloudflare Tunnel Configuration for Local Development
# Tunnel: cognitive-bot (d9ae2bcf-194e-4194-99fc-394f01c3a07f)
# Exposes local services at *.local.revelations.studio for external integrations (e.g. Stripe webhooks)

tunnel: d9ae2bcf-194e-4194-99fc-394f01c3a07f
credentials-file: /Users/brucemckay/.cloudflared/d9ae2bcf-194e-4194-99fc-394f01c3a07f.json
protocol: http2

ingress:
  # Ecom-API for Stripe webhook forwarding (localhost:42072)
  - hostname: ecom-api-local.revelations.studio
    service: http://localhost:42072
    originRequest:
      noTLSVerify: true

  # SvelteKit app (localhost:3000)
  - hostname: local.revelations.studio
    service: http://localhost:3000
    originRequest:
      noTLSVerify: true

  # Catch-all rule (required by cloudflared)
  - service: http_status:404
